<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expresso Ricci — Sistema de Fretes</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A5FA8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fretes MEI">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
:root{
  --blue:#1A5FA8;--blue-dark:#0D3F75;--blue-light:#E8F0FB;
  --green:#276C14;--green-light:#EAF3E0;
  --amber:#8A4A00;--amber-light:#FEF0DA;
  --purple:#5A1D9A;--purple-light:#EEE6FB;
  --red:#8B1A1A;--red-light:#FCEAEA;
  --gray-1:#F7F8FA;--gray-2:#ECEEF2;--gray-3:#D1D5DF;--gray-4:#8A90A0;--gray-5:#3D4250;--gray-6:#1A1D26;
  --radius:10px;--radius-sm:6px;--shadow:0 2px 8px rgba(0,0,0,.08);
  font-size:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F4F6FA;color:var(--gray-6);min-height:100vh}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid var(--gray-2);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:10}
.main{margin-left:220px;flex:1;padding:28px 32px;max-width:1100px}
@media(max-width:700px){.sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--gray-2)}.main{margin-left:0;padding:16px}}

/* Sidebar */
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--gray-2)}
.logo-nome{font-size:13px;font-weight:700;color:var(--blue);line-height:1.3}
.logo-sub{font-size:11px;color:var(--gray-4);margin-top:2px}
.nav-group{padding:12px 10px 4px}
.nav-label{font-size:10px;font-weight:600;color:var(--gray-4);text-transform:uppercase;letter-spacing:.07em;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--gray-4);transition:.12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--gray-1);color:var(--gray-6)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.nav-item i{font-size:16px}
.nav-badge{margin-left:auto;background:var(--blue-light);color:var(--blue);border-radius:12px;padding:1px 8px;font-size:10px;font-weight:700}
.nav-badge.purple{background:var(--purple-light);color:var(--purple)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:#fff;border-radius:var(--radius);padding:16px;border:1px solid var(--gray-2);box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--gray-4);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.stat-val{font-size:26px;font-weight:700;color:var(--gray-6)}
.stat-val.blue{color:var(--blue)}.stat-val.green{color:var(--green)}.stat-val.amber{color:var(--amber)}.stat-val.purple{color:var(--purple)}

/* Card */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-2);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-title{font-size:16px;font-weight:700;color:var(--gray-6);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title i{color:var(--blue)}

/* Page header */
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;color:var(--gray-6)}
.page-sub{font-size:13px;color:var(--gray-4);margin-top:3px}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--gray-5);display:flex;align-items:center;gap:5px}
.field label .badge-pill{font-size:10px;font-weight:500;background:var(--blue-light);color:var(--blue);padding:2px 7px;border-radius:20px}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);font-size:13px;background:#fff;color:var(--gray-6);font-family:'DM Sans',sans-serif;transition:.12s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,.1)}
.field input.highlight{border-color:var(--blue);background:var(--blue-light);font-weight:600}
.section-sep{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin-top:4px}
.section-sep span{font-size:11px;font-weight:600;color:var(--gray-4);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.section-sep::before,.section-sep::after{content:'';flex:1;height:1px;background:var(--gray-2)}
.section-sep::before{display:none}
.char-count{font-size:11px;color:var(--gray-4);text-align:right}

/* Tipo toggle */
.tipo-toggle{display:flex;border:1px solid var(--gray-3);border-radius:var(--radius-sm);overflow:hidden;grid-column:1/-1}
.tipo-btn{flex:1;padding:10px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:#fff;color:var(--gray-4);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.tipo-btn:first-child{border-right:1px solid var(--gray-3)}
.tipo-btn.sel.fat{background:var(--green-light);color:var(--green)}
.tipo-btn.sel.men{background:var(--purple-light);color:var(--purple)}
.tipo-hint{font-size:11px;color:var(--gray-4);grid-column:1/-1;margin-top:-4px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:.12s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#1b4d0d}
.btn-sec{background:#fff;color:var(--gray-5);border:1px solid var(--gray-3)}.btn-sec:hover{background:var(--gray-1);color:var(--gray-6)}
.btn-danger{background:#fff;color:var(--red);border:1px solid #F5C0C0}.btn-danger:hover{background:var(--red-light)}
.btn-sm{padding:6px 12px;font-size:12px}

/* Table */
.table-wrap{overflow-x:auto;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;color:var(--gray-4);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--gray-2);background:#FAFBFD;white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--gray-2);vertical-align:middle;color:var(--gray-6)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--gray-1)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-pend{background:var(--amber-light);color:var(--amber)}
.b-nf{background:var(--blue-light);color:var(--blue)}
.b-pago{background:var(--green-light);color:var(--green)}
.b-cancel{background:var(--red-light);color:var(--red)}
.b-fat{background:var(--green-light);color:var(--green)}
.b-men{background:var(--purple-light);color:var(--purple)}

/* Filter row */
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:8px 12px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);font-size:13px;background:#fff;color:var(--gray-6);font-family:'DM Sans',sans-serif}
.filter-row input{flex:1;min-width:140px}

/* Action row */
.action-row{display:flex;gap:5px}

/* Pasta mensal */
.pasta{border:1px solid var(--gray-2);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.pasta-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#FAFBFD;gap:8px;transition:.12s}
.pasta-header:hover{background:var(--blue-light)}
.pasta-titulo{font-size:14px;font-weight:700;color:var(--gray-6);display:flex;align-items:center;gap:9px}
.pasta-meta{display:flex;gap:12px;align-items:center;font-size:13px}
.pasta-body{padding:0 18px 18px;display:none;border-top:1px solid var(--gray-2);background:#fff}
.pasta-body.open{display:block}

/* Alert */
.alert{padding:11px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:500}
.alert-ok{background:var(--green-light);color:var(--green);border:1px solid #B8DDA8}
.alert-err{background:var(--red-light);color:var(--red);border:1px solid #F5C0C0}

/* Empty */
.empty{text-align:center;padding:3rem 1rem;color:var(--gray-4)}
.empty i{font-size:42px;display:block;margin-bottom:10px;opacity:.3}

/* Documento NFS-e */
.doc{background:#fff;border:1px solid var(--gray-3);border-radius:var(--radius);padding:28px;font-size:12px;color:#111}
.doc-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid var(--blue);padding-bottom:14px;margin-bottom:16px}
.doc-empresa{font-size:15px;font-weight:800;color:var(--blue)}
.doc-info{font-size:11px;color:#555;margin-top:3px;line-height:1.6}
.doc-nf-num{text-align:right}
.doc-nf-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.06em}
.doc-nf-val{font-size:22px;font-weight:800;color:var(--blue)}
.doc-bloco{background:#F7F8FA;border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:10px}
.doc-bloco-title{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.doc-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.doc-row span:first-child{color:#666}
.doc-row span:last-child{font-weight:600;text-align:right;max-width:55%}
.doc-servico-box{border-left:3px solid #F0A020;background:#FFFBF0;border-radius:0 6px 6px 0;padding:11px 14px;margin-bottom:10px}
.doc-servico-label{font-size:10px;font-weight:700;color:#A06000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.doc-servico-val{font-size:14px;font-weight:700;color:#333;line-height:1.5}
.doc-desc-box{border-left:3px solid var(--blue);background:var(--blue-light);border-radius:0 6px 6px 0;padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.7;color:#333}
.doc-total{text-align:right;font-size:20px;font-weight:800;color:var(--blue);margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-2)}
.doc-footer{font-size:10px;color:#aaa;margin-top:12px;border-top:.5px solid var(--gray-2);padding-top:8px;line-height:1.6}

/* Relatório */
.rel-wrap{border:1px solid var(--blue);border-radius:var(--radius);overflow:hidden;margin-top:4px}
.rel-header{background:var(--blue);color:#fff;padding:18px 22px}
.rel-header-title{font-size:17px;font-weight:700}
.rel-header-sub{font-size:12px;opacity:.8;margin-top:3px}
.rel-body{padding:20px 22px;background:#fff}
.rel-sumario{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.rel-sum-item{background:var(--gray-1);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--gray-2)}
.rel-sum-label{font-size:11px;color:var(--gray-4);font-weight:500;margin-bottom:4px}
.rel-sum-val{font-size:20px;font-weight:700;color:var(--blue)}
.rel-table{width:100%;border-collapse:collapse;font-size:13px}
.rel-table th{background:var(--blue-light);padding:9px 12px;text-align:left;font-size:11px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.rel-table td{padding:10px 12px;border-bottom:.5px solid var(--gray-2);vertical-align:top}
.rel-table tr:last-child td{border-bottom:none}
.rel-table .total-row{background:var(--blue-light);font-weight:700;color:var(--blue)}

/* Boleto */
.boleto-bar{display:flex;align-items:center;justify-content:center;background:#111;height:48px;border-radius:4px;margin:8px 0;overflow:hidden}
.boleto-linha{background:#fff;border:2px dashed var(--blue);border-radius:6px;padding:12px;margin:10px 0;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;color:var(--blue);text-align:center;word-break:break-all}

/* Print */
@media print{
  .sidebar,.filter-row,.action-row,.btn,.alert{display:none!important}
  .main{margin:0;padding:0;max-width:100%}
  .card{border:none;box-shadow:none;padding:0}
  .doc{border:1px solid #ccc}
}
</style>

<script>
const EMPRESA={nome:'Expresso Ricci',cnpj:'53.651.463/0001-80',tipo:'MEI — Transportador Autônomo',logradouro:'Rua Aurélio Campos, 427',bairro:'Piedade',cidade:'Itaúna',uf:'MG',cep:'35680-267',endFull:'Rua Aurélio Campos, 427 — Piedade, Itaúna/MG — CEP 35680-267'};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let fretes=[],clientes=[],form={tipo:'faturado'},docFrete=null,alerta=null,filtro='',filtroStatus='',filtroTipo='',pastaAberta=null,relGerado=null,relMes='',relAno='',tabAtual='dashboard';

function save(){localStorage.setItem('fretes_marco_v3',JSON.stringify(fretes));localStorage.setItem('clientes_marco',JSON.stringify(clientes));syncFretesFirebase();}
function load(){try{const d=localStorage.getItem('fretes_marco_v3');if(d)fretes=JSON.parse(d);}catch(e){}try{const c=localStorage.getItem('clientes_marco');if(c)clientes=JSON.parse(c);}catch(e){}}

// ═══ FIREBASE SYNC FRETES ═══
let syncTimer=null;
function syncFretesFirebase(){
  if(!fbDb)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{
    fbDb.collection('fretes_admin').doc('dados').set({
      fretes:JSON.stringify(fretes),
      clientes:JSON.stringify(clientes),
      atualizadoEm:new Date().toISOString()
    }).then(()=>{
      console.log('Backup Firebase OK - '+new Date().toLocaleTimeString());
    }).catch(e=>console.log('Sync erro:',e));
  },2000);
}

function carregarFretesFirebase(){
  if(!fbDb)return;
  fbDb.collection('fretes_admin').doc('dados').get().then(doc=>{
    if(doc.exists){
      const d=doc.data();
      try{
        const fbFretes=JSON.parse(d.fretes||'[]');
        const fbClientes=JSON.parse(d.clientes||'[]');
        // Se local está vazio mas Firebase tem dados, usa Firebase
        if(fretes.length===0&&fbFretes.length>0){
          fretes=fbFretes;
          localStorage.setItem('fretes_marco_v3',JSON.stringify(fretes));
        }
        if(clientes.length===0&&fbClientes.length>0){
          clientes=fbClientes;
          localStorage.setItem('clientes_marco',JSON.stringify(clientes));
        }
        // Se Firebase tem mais dados que local, merge
        if(fbFretes.length>fretes.length){
          fbFretes.forEach(ff=>{
            if(!fretes.find(f=>f.id===ff.id)){fretes.push(ff);}
          });
          localStorage.setItem('fretes_marco_v3',JSON.stringify(fretes));
        }
        if(fbClientes.length>clientes.length){
          fbClientes.forEach(fc=>{
            if(!clientes.find(c=>c.nome===fc.nome&&c.cnpj===fc.cnpj)){clientes.push(fc);}
          });
          localStorage.setItem('clientes_marco',JSON.stringify(clientes));
        }
        render();
        console.log('Dados Firebase carregados - Fretes:'+fbFretes.length+' Clientes:'+fbClientes.length);
      }catch(e){console.log('Parse Firebase erro:',e);}
    }
  }).catch(e=>console.log('Load Firebase erro:',e));
}

// ═══ EXPORT / IMPORT BACKUP ═══
function exportarBackup(){
  const dados={
    versao:'2.0',
    exportadoEm:new Date().toISOString(),
    empresa:EMPRESA.nome,
    fretes:fretes,
    clientes:clientes
  };
  const blob=new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='backup-expresso-ricci-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  alerta={tipo:'ok',msg:'Backup exportado com sucesso!'};
  render();
}

function importarBackup(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const dados=JSON.parse(ev.target.result);
        if(!dados.fretes||!dados.clientes){throw new Error('Formato inválido');}
        const totalFretes=dados.fretes.length;
        const totalClientes=dados.clientes.length;
        if(confirm(`Importar backup de ${dados.exportadoEm||'data desconhecida'}?\n\n${totalFretes} fretes e ${totalClientes} clientes.\n\nOs dados atuais serão SUBSTITUÍDOS.`)){
          fretes=dados.fretes;
          clientes=dados.clientes;
          save();
          alerta={tipo:'ok',msg:`Backup importado! ${totalFretes} fretes e ${totalClientes} clientes restaurados.`};
          render();
        }
      }catch(err){
        alerta={tipo:'err',msg:'Erro ao importar: arquivo inválido. Use um backup .json exportado pelo sistema.'};
        render();
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
function genId(){return'F'+Date.now().toString(36).toUpperCase();}
function genNFS(){return String(Math.floor(Math.random()*90000)+10000);}
function genBoleto(){const s=()=>Math.random().toString().slice(2,12);return`34191.${s().slice(0,5)} ${s().slice(0,5)}.${s().slice(0,6)} ${s().slice(0,5)}.${s().slice(0,6)} 1 ${Date.now().toString().slice(-14)}`;}
function fmtDate(d){if(!d)return'-';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function fmtMoney(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function getMesAno(d){return d?d.slice(0,7):'';}
function getMesNome(k){if(!k)return'';const[y,m]=k.split('-');return`${MESES[parseInt(m)-1]} / ${y}`;}
function totalMes(){const h=new Date();const k=`${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}`;return fretes.filter(f=>getMesAno(f.data)===k&&f.status!=='Cancelado').reduce((s,f)=>s+Number(f.valor||0),0);}
function badgeSt(f){if(f.status==='Pago')return`<span class="badge b-pago"><i class="ti ti-check" style="font-size:10px"></i>Pago</span>`;if(f.status==='Cancelado')return`<span class="badge b-cancel"><i class="ti ti-x" style="font-size:10px"></i>Cancelado</span>`;if(f.nfs)return`<span class="badge b-nf"><i class="ti ti-file-invoice" style="font-size:10px"></i>NFS-e</span>`;return`<span class="badge b-pend"><i class="ti ti-clock" style="font-size:10px"></i>Pendente</span>`;}
function badgeTp(f){return f.tipo==='mensal'?`<span class="badge b-men"><i class="ti ti-calendar-month" style="font-size:10px"></i>Mensal</span>`:`<span class="badge b-fat"><i class="ti ti-file-dollar" style="font-size:10px"></i>Faturado</span>`;}

function nav(t){
  tabAtual=t;alerta=null;docFrete=null;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+t);if(nb)nb.classList.add('active');

}

function sf(k,v){form[k]=v;if(k==='tipo')renderForm();else if(k==='servico'){const c=document.querySelector('.field.full .char-count');if(c)c.textContent=v.length+'/150';}else if(k==='descricao'){const cs=document.querySelectorAll('.field.full .char-count');if(cs[1])cs[1].textContent=v.length+'/400';}}

    <button class="tipo-btn men ${f.tipo==='mensal'?'sel':''}" onclick="sf('tipo','mensal')"><i class="ti ti-calendar-month"></i> Mensal <span style="font-size:11px;opacity:.7">(agrupa por mês)</span></button>

  ${f.tipo==='mensal'?'<p class="tipo-hint"><i class="ti ti-info-circle" style="font-size:12px"></i> Este lançamento será agrupado na pasta do mês correspondente e aparecerá no relatório mensal.</p>':''}

  <div class="section-sep"><span><i class="ti ti-calendar" style="font-size:11px"></i> Dados do serviço</span></div>

  <div class="field full">

  <div class="field full">

  </div>

  <div class="section-sep"><span><i class="ti ti-user" style="font-size:11px"></i> Tomador do serviço</span></div>

  <div class="field"><label>CNPJ / CPF</label><input type="text" placeholder="00.000.000/0001-00" value="${f.cnpj||''}" oninput="sf('cnpj',this.value)"></div>

  <div class="section-sep"><span><i class="ti ti-map-pin" style="font-size:11px"></i> Rota</span></div>

function render(){
  const el=document.getElementById('nb-count');if(el)el.textContent=fretes.filter(f=>f.status!=='Cancelado').length;
  const em=document.getElementById('nb-men-count');if(em)em.textContent=fretes.filter(f=>f.tipo==='mensal'&&f.status!=='Cancelado').length;
  const ec=document.getElementById('nb-cli-count');if(ec)ec.textContent=clientes.length;

  const main=document.getElementById('main');
  let h='';

  if(alerta){
    h+=`<div class="alert ${alerta.tipo==='ok'?'alert-ok':'alert-err'}"><i class="ti ti-${alerta.tipo==='ok'?'check':'alert-circle'}"></i>${alerta.msg}</div>`;
    setTimeout(()=>{alerta=null;render();},3800);
  }

  // DASHBOARD
  if(tabAtual==='dashboard'){
    h+=`<div class="page-header"><div class="page-title">Dashboard</div><div class="page-sub">${EMPRESA.endFull}</div></div>`;
    const pend=fretes.filter(f=>f.status==='Pendente').length;
    const nfsN=fretes.filter(f=>f.nfs).length;
    const mens=fretes.filter(f=>f.tipo==='mensal'&&f.status!=='Cancelado').length;
    h+=`<div class="stats">
      <div class="stat"><div class="stat-label"><i class="ti ti-truck"></i> Total fretes</div><div class="stat-val blue">${fretes.filter(f=>f.status!=='Cancelado').length}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-calendar-month"></i> Receita do mês</div><div class="stat-val blue">${fmtMoney(totalMes())}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-clock"></i> Pendentes</div><div class="stat-val amber">${pend}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-file-invoice"></i> NFS-e emitidas</div><div class="stat-val blue">${nfsN}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-folders"></i> Mensais</div><div class="stat-val purple">${mens}</div></div>
    </div>`;
    const rec=[...fretes].filter(f=>f.status!=='Cancelado').sort((a,b)=>b.criadoEm-a.criadoEm).slice(0,6);
    h+=`<div class="card"><div class="card-title"><i class="ti ti-history"></i> Últimos lançamentos</div>`;
    if(!rec.length)h+=`<div class="empty"><i class="ti ti-truck"></i>Nenhum lançamento ainda.<br><small>Clique em "Novo lançamento" para começar.</small></div>`;
    else{
      h+=`<div class="table-wrap"><table><thead><tr><th>Data</th><th>Tomador</th><th>Serviço prestado</th><th>Valor</th><th>Tipo</th><th>Status</th></tr></thead><tbody>`;
      rec.forEach(f=>{h+=`<tr><td style="white-space:nowrap">${fmtDate(f.data)}</td><td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.tomador||'-'}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.servico||'-'}</td><td style="font-weight:700;white-space:nowrap">${fmtMoney(f.valor)}</td><td>${badgeTp(f)}</td><td>${badgeSt(f)}</td></tr>`;});
      h+=`</tbody></table></div>`;
    }
    h+=`</div>`;
  }

  // NOVO
  if(tabAtual==='novo'){
    h+=`<div class="page-header"><div class="page-title">Novo lançamento</div><div class="page-sub">Preencha os dados do frete</div></div>`;

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-2)">
      <button class="btn btn-sec" onclick="limpar()"><i class="ti ti-x"></i> Limpar</button>
      <button class="btn btn-primary" onclick="salvar()"><i class="ti ti-check"></i> Salvar lançamento</button>
    </div></div>`;
  }

  // FRETES
  if(tabAtual==='fretes'){
    h+=`<div class="page-header"><div class="page-title">Todos os fretes</div></div>`;
    h+=`<div class="card">
    <div class="filter-row">
      <input type="text" placeholder="Buscar tomador ou serviço..." value="${filtro}" oninput="filtro=this.value;render()">
      <select onchange="filtroStatus=this.value;render()">
        <option value="">Todos os status</option>
        <option value="Pendente" ${filtroStatus==='Pendente'?'selected':''}>Pendente</option>
        <option value="Pago" ${filtroStatus==='Pago'?'selected':''}>Pago</option>
        <option value="Cancelado" ${filtroStatus==='Cancelado'?'selected':''}>Cancelado</option>
      </select>
      <select onchange="filtroTipo=this.value;render()">
        <option value="">Todos os tipos</option>
        <option value="faturado" ${filtroTipo==='faturado'?'selected':''}>Faturado</option>
        <option value="mensal" ${filtroTipo==='mensal'?'selected':''}>Mensal</option>
      </select>
    </div>`;
    let lista=fretes.filter(f=>{
      const t=`${f.tomador} ${f.servico} ${f.origem} ${f.destino}`.toLowerCase();
      return(!filtro||t.includes(filtro.toLowerCase()))&&(!filtroStatus||f.status===filtroStatus)&&(!filtroTipo||f.tipo===filtroTipo);
    }).sort((a,b)=>b.criadoEm-a.criadoEm);
    if(!lista.length)h+=`<div class="empty"><i class="ti ti-search"></i>Nenhum frete encontrado.</div>`;
    else{
      h+=`<div class="table-wrap"><table><thead><tr><th>Data</th><th>Tomador</th><th>Serviço prestado</th><th>Valor</th><th>Tipo</th><th>NFS-e</th><th>Status</th><th>Ações</th></tr></thead><tbody>`;
      lista.forEach(f=>{
        h+=`<tr>

          <td style="max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.servico||'-'}</td>

          <td style="font-size:12px">${f.nfs?`<span style="color:var(--blue);font-weight:700">#${f.nfs}</span>`:'-'}</td>
          <td>${badgeSt(f)}</td>
          <td><div class="action-row">
            ${f.status!=='Cancelado'&&!f.nfs?`<button class="btn btn-primary btn-sm" onclick="docFrete={id:'${f.id}',tipo:'nfs'};nav('nfs')" title="Emitir NFS-e"><i class="ti ti-file-invoice"></i></button>`:''}
            ${f.nfs?`<button class="btn btn-sec btn-sm" onclick="docFrete={id:'${f.id}',tipo:'nfs'};nav('nfs')" title="Ver NFS-e #${f.nfs}"><i class="ti ti-eye"></i></button>`:''}
            ${f.status!=='Cancelado'&&f.status!=='Pago'?`<button class="btn btn-sec btn-sm" onclick="marcarPago('${f.id}')" title="Marcar pago"><i class="ti ti-check"></i></button>`:''}
            <button class="btn btn-danger btn-sm" onclick="cancelar('${f.id}')" title="Excluir"><i class="ti ti-trash"></i></button>
          </div></td>
        </tr>`;
      });
      h+=`</tbody></table></div>`;
    }
    h+=`</div>`;
  }

  // MENSAL
  if(tabAtual==='mensal'){
    h+=`<div class="page-header"><div class="page-title">Pasta mensal</div><div class="page-sub">Fretes agrupados por mês e por cliente para fechamento</div></div>`;
    const mens=fretes.filter(f=>f.tipo==='mensal'&&f.status!=='Cancelado');
    const grupos={};
    mens.forEach(f=>{const k=getMesAno(f.data);if(!grupos[k])grupos[k]=[];grupos[k].push(f);});
    const chaves=Object.keys(grupos).sort((a,b)=>b.localeCompare(a));
    if(!chaves.length){
      h+=`<div class="card"><div class="empty"><i class="ti ti-folder-off"></i>Nenhum frete mensal lançado ainda.<br><small>Ao lançar um frete com tipo "Mensal", ele aparecerá aqui agrupado por mês e por cliente.</small></div></div>`;
    } else {
      chaves.forEach(k=>{
        const itens=grupos[k];
        const total=itens.reduce((s,f)=>s+Number(f.valor||0),0);
        const ab=pastaAberta===k;
        // Agrupar por cliente (tomador)
        const porCliente={};
        itens.forEach(f=>{const cli=f.tomador||f.cnpj||'Sem cliente';if(!porCliente[cli])porCliente[cli]=[];porCliente[cli].push(f);});
        const cliKeys=Object.keys(porCliente).sort();
        h+=`<div class="pasta">
          <div class="pasta-header" onclick="togglePasta('${k}')">
            <div class="pasta-titulo"><i class="ti ti-folder${ab?'-open':''}" style="color:var(--blue);font-size:18px"></i>${getMesNome(k)}</div>
            <div class="pasta-meta">
              <span style="color:var(--gray-4)">${cliKeys.length} cliente${cliKeys.length>1?'s':''} · ${itens.length} frete${itens.length>1?'s':''}</span>
              <span style="font-weight:700;color:var(--blue)">${fmtMoney(total)}</span>
              <button class="btn btn-green btn-sm" onclick="event.stopPropagation();gerarRel('${k}')"><i class="ti ti-report"></i> Relatório</button>
              <i class="ti ti-chevron-${ab?'up':'down'}" style="color:var(--gray-4)"></i>
            </div>

async function aprovarMot(id){
  if(!fbDb) return;
  const item = (window._motFretes||[]).find(f=>f._id===id);
  if(!item) return;
  try {
    // Atualiza no Firebase
    await fbDb.collection('fretes_motoristas').doc(id).update({
      status: 'aprovado',
      _dataAprov: hoje()
    });
    // Cria lançamento no sistema local
    const novo = {
      id: genId(),
      data: item.datetime?item.datetime.slice(0,10):'',
      vencimento: item.vencimento||'',
      servico: item.servico||'',
      tomador: item.pagadorNome||item.remetente||'',
      cnpj: item.pagador==='remetente'?(item.remCnpj||''):item.pagador==='destinatario'?(item.destCnpj||''):'',
      origem: item.origem||'',
      destino: item.destino||'',
      valor: item.valor||0,
      tipo: item.tipo||'faturado',
      placa: '',
      pagamento: item.formaPgto==='avista'?'Dinheiro':item.formaPgto==='pix'?'PIX':item.formaPgto==='boleto'?'Boleto':'',
      descricao: `Remetente: ${item.remetente||'-'} → Destinatário: ${item.destinatario||'-'}`,
      obs: `Registrado por ${item.motorista}${item.emitirNF==='sim'?' — NF SOLICITADA':''}${item.obs?' — '+item.obs:''}`,
      status: 'Pendente',
      criadoEm: Date.now(),
      _motorista: item.motorista,
      _remetente: item.remetente||'',
      _destinatario: item.destinatario||''
    };
    fretes.push(novo);

function cnabStr(v,n,dir='R',pad=' '){
  v=String(v??'').toUpperCase().replace(/[^\x20-\x7E]/g,' ');
  if(dir==='L') return v.slice(0,n).padStart(n,pad);
  return v.slice(0,n).padEnd(n,pad);
}
function cnabNum(v,n){ return String(Math.round(Number(v)||0)).padStart(n,'0').slice(-n); }
function cnabData(d){
  if(!d)return'00000000';
  const[y,m,day]=d.split('-');
  return `${day}${m}${y}`;
}
function cnabValidar(linha,pos){
  if(linha.length!==240){
    console.warn(`Linha ${pos}: ${linha.length} chars (esperado 240). Ajustando.`);
    return linha.length<240?linha.padEnd(240,' '):linha.slice(0,240);
  }
  return linha;
}

function gerarCNAB240(lote){
  const hoje=new Date();
  const dd=String(hoje.getDate()).padStart(2,'0');
  const mm=String(hoje.getMonth()+1).padStart(2,'0');
  const aaaa=String(hoje.getFullYear());
  const hh=String(hoje.getHours()).padStart(2,'0');
  const mi=String(hoje.getMinutes()).padStart(2,'0');
  const ss=String(hoje.getSeconds()).padStart(2,'0');
  const dataHoje=`${dd}${mm}${aaaa}`;
  const horaHoje=`${hh}${mi}${ss}`;
  const seqArqStr=cnabNum(CNAB.seqArq,6);
  let linhas=[], seqReg=0, totalVal=0, qtdTit=0;

  // ── HEADER ARQUIVO ──────────────────────── 240 chars
  let r='';
  r+=CNAB.banco;                         // 001-003  3
  r+='0000';                             // 004-007  4
  r+='0';                                // 008      1
  r+=cnabStr('',9);                      // 009-017  9
  r+='2';                                // 018      1
  r+=cnabNum(CNAB.cnpj,14);             // 019-032 14
  r+=cnabStr(CNAB.coop+CNAB.codBenef,20);// 033-052 20
  r+=CNAB.coop;                          // 053-057  5
  r+=CNAB.dvCoop;                        // 058      1
  r+=cnabNum(CNAB.codBenef,12);          // 059-070 12
  r+=CNAB.dvConta;                       // 071      1
  r+=CNAB.dvAgConta;                     // 072      1
  r+=cnabStr(CNAB.nomeEmp,30);           // 073-102 30
  r+=cnabStr(CNAB.nomeBanco,30);         // 103-132 30
  r+=cnabStr('',10);                     // 133-142 10
  r+='1';                                // 143      1
  r+=dataHoje;                           // 144-151  8
  r+=horaHoje;                           // 152-157  6
  r+=seqArqStr;                          // 158-163  6
  r+='083';                              // 164-166  3
  r+='01600';                            // 167-171  5
  r+=cnabStr('',20);                     // 172-191 20
  r+=cnabStr('',20);                     // 192-211 20
  r+=cnabStr('',29);                     // 212-240 29
  linhas.push(cnabValidar(r,'HA'));

  // ── HEADER LOTE ─────────────────────────── 240 chars
  r='';
  r+=CNAB.banco;                         // 001-003  3
  r+='0001';                             // 004-007  4
  r+='1';                                // 008      1
  r+='C';                                // 009      1
  r+='01';                               // 010-011  2
  r+='01';                               // 012-013  2
  r+='030';                              // 014-016  3
  r+=' ';                                // 017      1
  r+='2';                                // 018      1
  r+=cnabNum(CNAB.cnpj,14);             // 019-032 14
  r+=cnabStr(CNAB.coop+CNAB.codBenef,20);// 033-052 20
  r+=CNAB.coop;                          // 053-057  5
  r+=CNAB.dvCoop;                        // 058      1
  r+=cnabNum(CNAB.codBenef,12);          // 059-070 12
  r+=CNAB.dvConta;                       // 071      1
  r+=CNAB.dvAgConta;                     // 072      1
  r+=cnabStr(CNAB.nomeEmp,30);           // 073-102 30
  r+=cnabStr('',40);                     // 103-142 40
  r+=cnabStr('',40);                     // 143-182 40
  r+=cnabNum(seqArqStr,8);               // 183-190  8
  r+=dataHoje;                           // 191-198  8
  r+='00000000';                         // 199-206  8
  r+=cnabStr('',34);                     // 207-240 34
  linhas.push(cnabValidar(r,'HL'));

  // ── DETALHES ────────────────────────────────────────────
  lote.forEach((f,idx)=>{
    seqReg++;qtdTit++;
    totalVal+=Number(f.valor||0);

    const nossoNumSeq=cnabNum(idx+1,9);

    // ── SEGMENTO P ────────────────── 240 chars
    r='';

    r+='3';                              // 008      1
    r+=cnabNum(seqReg,5);                // 009-013  5
    r+='P';                              // 014      1
    r+=' ';                              // 015      1

    r+=CNAB.coop;                        // 018-022  5
    r+=CNAB.dvCoop;                      // 023      1
    r+=cnabNum(CNAB.codBenef,12);        // 024-035 12

    linhas.push(cnabValidar(r,`SP-${idx}`));

    // ── SEGMENTO Q ────────────────── 240 chars

    r+='Q';                              // 014      1
    r+=' ';                              // 015      1
    r+='01';                             // 016-017  2
    r+=tipoPag;                          // 018      1
    r+=cnpjPagN;                         // 019-033 15
    r+=cnabStr(f.tomador||'',40);        // 034-073 40
    r+=cnabStr(f.origem||'',40);         // 074-113 40  endereço (usamos origem)
    r+=cnabStr('',15);                   // 114-128 15  bairro
    r+=cnabNum(0,8);                     // 129-136  8  CEP
    r+=cnabStr('',15);                   // 137-151 15  cidade
    r+=cnabStr('MG',2);                  // 152-153  2  UF
    r+='0';                              // 154      1  sacador: isento
    r+=cnabNum(0,15);                    // 155-169 15  inscrição sacador
    r+=cnabStr('',40);                   // 170-209 40  nome sacador
    r+=cnabNum(0,3);                     // 210-212  3  banco correspondente
    r+=cnabStr('',20);                   // 213-232 20  nosso num banco corr
    r+=cnabStr('',8);                    // 233-240  8  brancos
    linhas.push(cnabValidar(r,`SQ-${idx}`));
  });

  // ── TRAILER LOTE ────────────────── 240 chars
  const totLote=2+qtdTit*2+1;
  const totalCents=cnabNum(Math.round(totalVal*100),17);
  r='';
  r+=CNAB.banco;                         // 001-003  3
  r+='0001';                             // 004-007  4
  r+='5';                                // 008      1
  r+=cnabStr('',9);                      // 009-017  9
  r+=cnabNum(totLote,6);                 // 018-023  6  qtd registros lote
  r+=cnabNum(qtdTit,6);                  // 024-029  6  qtd títulos
  r+=totalCents;                         // 030-046 17  valor total
  r+=cnabNum(0,6);                       // 047-052  6  qtd vinculada
  r+=cnabNum(0,17);                      // 053-069 17  val vinculada
  r+=cnabNum(0,6);                       // 070-075  6  qtd caucionada
  r+=cnabNum(0,17);                      // 076-092 17  val caucionada
  r+=cnabNum(0,6);                       // 093-098  6  qtd descontada
  r+=cnabNum(0,17);                      // 099-115 17  val descontada
  r+=cnabNum(0,8);                       // 116-123  8  aviso débito
  r+=cnabStr('',117);                    // 124-240 117 brancos
  linhas.push(cnabValidar(r,'TL'));

  // ── TRAILER ARQUIVO ─────────────── 240 chars
  const totArq=linhas.length+1;
  r='';
  r+=CNAB.banco;                         // 001-003  3
  r+='9999';                             // 004-007  4
  r+='9';                                // 008      1
  r+=cnabStr('',9);                      // 009-017  9
  r+=cnabNum(1,6);                       // 018-023  6  qtd lotes
  r+=cnabNum(totArq,6);                  // 024-029  6  qtd registros
  r+=cnabStr('',6);                      // 030-035  6  qtd contas
  r+=cnabStr('',205);                    // 036-240 205 brancos
  linhas.push(cnabValidar(r,'TA'));

  CNAB.seqArq++;
  return linhas.join('\r\n');
}

function calcDVMod11(num){
  // Módulo 11 para DV nosso número SICOOB
  const n=String(num).split('').reverse();
  let soma=0,peso=2;
  for(let i=0;i<n.length;i++){soma+=parseInt(n[i])*peso;peso=peso===9?2:peso+1;}
  const resto=soma%11;
  if(resto===0||resto===1)return'0';
  return String(11-resto);
}

// ── CNAB 240 RETORNO ───────────────────────────────────────────────
const OCORRENCIAS = {
  '02':'Entrada confirmada',
  '03':'Entrada rejeitada',
  '06':'Liquidação — PAGO',
  '09':'Baixa efetuada',
  '10':'Baixa solicitada',
  '11':'Em cartório',
  '14':'Vencimento alterado',
  '17':'Abatimento concedido',
  '19':'Abatimento cancelado',
  '23':'Remessa rejeitada',
  '25':'Protestado',
  '28':'Débito em conta',
  '30':'Alteração de dados',
};

function cnabDataFmt(s){
  // DDMMAAAA → DD/MM/AAAA
  if(!s||s==='00000000')return'-';
  return`${s.slice(0,2)}/${s.slice(2,4)}/${s.slice(4,8)}`;
}

function lerArquivoRetorno(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      processarArquivoRetorno(e.target.result,file.name);
    }catch(err){
      alerta={tipo:'err',msg:'Erro ao ler o arquivo: '+err.message};render();
    }
  };
  reader.readAsText(e=>{}); // dummy
  // Use readAsText with latin1 encoding for CNAB files
  const r2=new FileReader();
  r2.onload=e2=>{
    try{processarArquivoRetorno(e2.target.result,file.name);}
    catch(err){alerta={tipo:'err',msg:'Erro ao processar: '+err.message};render();}
  };
  r2.readAsText(file,'ISO-8859-1');
}

function processarArquivoRetorno(conteudo,nomeArq){
  const linhas=conteudo.split(/\r?\n/).filter(l=>l.trim().length>0);
  const registros=linhas.filter(l=>l.length>=240);

  if(!registros.length){
    alerta={tipo:'err',msg:'Arquivo inválido: nenhum registro CNAB 240 encontrado. Verifique se é um arquivo .RET do SICOOB.'};
    render();return;
  }

  // Verificar se é arquivo SICOOB (banco 756)
  const headerArq=registros.find(l=>l[7]==='0');
  if(headerArq&&headerArq.slice(0,3)!=='756'){
    alerta={tipo:'err',msg:`Banco ${headerArq.slice(0,3)} não reconhecido. Este sistema está configurado para SICOOB (756).`};
    render();return;
  }

  const itens=[];
  let pagos=0,confirmados=0,rejeitados=0,baixados=0,naoEncontrados=0;

  registros.forEach(linha=>{
    if(linha.length<240)return;
    const tipoReg=linha[7];  // pos 8
    const seg=linha[13];     // pos 14

    if(tipoReg!=='3'||seg!=='P')return; // só Segmento P

    const codOcorr=linha.substring(15,17).trim();  // pos 16-17
    const nossoNum=linha.substring(37,57).trim();   // pos 38-57
    const numDoc=linha.substring(57,72).trim();     // pos 58-72
    const dataVencRaw=linha.substring(72,80);       // pos 73-80 DDMMAAAA
    const valorCents=parseInt(linha.substring(80,95)||'0'); // pos 81-95
    const dataOcorrRaw=linha.substring(142,150);    // pos 143-150
    const dataCreditoRaw=linha.substring(150,158);  // pos 151-158

    const valor=valorCents/100;
    const dataVenc=cnabDataFmt(dataVencRaw);
    const dataPagto=dataCreditoRaw!=='00000000'?cnabDataFmt(dataCreditoRaw):
                    dataOcorrRaw!=='00000000'?cnabDataFmt(dataOcorrRaw):null;
    const ocorrenciaDesc=OCORRENCIAS[codOcorr]||`Ocorrência ${codOcorr}`;

    // Tentar encontrar o frete pelo numDoc (usamos f.id como numDoc)
    // ou pelo nosso número parcial
    let frete=fretes.find(f=>f.id&&numDoc.includes(f.id));
    if(!frete){
      // Tenta pelo valor + vencimento
      const vencISO=dataVencRaw!=='00000000'?
        `${dataVencRaw.slice(4,8)}-${dataVencRaw.slice(2,4)}-${dataVencRaw.slice(0,2)}`:null;
      frete=fretes.find(f=>
        f.boleto&&
        Math.abs(Number(f.valor)-valor)<0.01&&
        (vencISO?f.vencimento===vencISO:true)
      );
    }

    let tipo,statusMsg;
    if(codOcorr==='06'||codOcorr==='28'){
      tipo='pago';pagos++;
      statusMsg=frete?`✔ Frete de ${frete.tomador} atualizado para PAGO`:'Frete correspondente não encontrado no sistema';
    } else if(codOcorr==='02'){
      tipo='confirmado';confirmados++;
      statusMsg=frete?`✔ Entrada registrada para ${frete.tomador}`:'Boleto registrado no banco';
    } else if(codOcorr==='03'||codOcorr==='23'){
      tipo='rejeitado';rejeitados++;
      statusMsg=`⚠ Rejeitado — verifique o arquivo de remessa`;
    } else if(codOcorr==='09'||codOcorr==='10'){
      tipo='baixado';baixados++;
      statusMsg=frete?`Frete de ${frete.tomador} baixado`:'Boleto baixado';
    } else {
      tipo='info';
      statusMsg=ocorrenciaDesc;
    }

    if(!frete&&(tipo==='pago'||tipo==='confirmado'))naoEncontrados++;

    itens.push({
      codOcorr,ocorrenciaDesc,tipo,nossoNum,numDoc,
      dataVenc,valor,valorFmt:fmtMoney(valor),
      dataPagto,statusMsg,
      tomador:frete?frete.tomador:null,
      freteId:frete?frete.id:null,
    });
  });

  window._retornoResultado={
    arquivo:nomeArq,
    total:itens.length,
    pagos,confirmados,rejeitados,baixados,naoEncontrados,
    itens
  };
  nav('retorno');
}

function confirmarRetorno(){
  if(!window._retornoResultado)return;
  const res=window._retornoResultado;
  let atualizados=0;

  res.itens.forEach(it=>{
    if(!it.freteId)return;
    const f=fretes.find(x=>x.id===it.freteId);
    if(!f)return;

    if(it.tipo==='pago'){
      f.status='Pago';
      if(it.dataPagto&&it.dataPagto!=='-'){
        // Converter DD/MM/AAAA para AAAA-MM-DD
        const[dd,mm,aa]=it.dataPagto.split('/');
        f.dataPagamento=`${aa}-${mm}-${dd}`;
      }
      atualizados++;
    } else if(it.tipo==='baixado'){
      f.status='Cancelado';
      atualizados++;
    }
  });

  save();
  window._retornoResultado=null;
  alerta={tipo:'ok',msg:`Retorno processado! ${atualizados} frete${atualizados!==1?'s':''} atualizado${atualizados!==1?'s':''} no sistema.`};
  nav('controle');
}

function selecionarTodos(sel){
  document.querySelectorAll('.chk-boleto').forEach(c=>{c.checked=sel;});
  const ca=document.getElementById('chk-all');if(ca)ca.checked=sel;
  atualizarContSel();
}

function atualizarContSel(){
  const n=document.querySelectorAll('.chk-boleto:checked').length;
  const el=document.getElementById('count-sel');
  if(el)el.textContent=`${n} selecionado${n!==1?'s':''}`;
}

function gerarRemessa(){
  const selecionados=[...document.querySelectorAll('.chk-boleto:checked')].map(c=>c.dataset.id);
  if(!selecionados.length){alerta={tipo:'err',msg:'Selecione ao menos um boleto para gerar a remessa.'};render();return;}
  const lote=fretes.filter(f=>selecionados.includes(f.id));
  const cnab=gerarCNAB240(lote);
  const blob=new Blob([cnab],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date();
  const nome=`REMESSA_SICOOB_${String(d.getDate()).padStart(2,'0')}${String(d.getMonth()+1).padStart(2,'0')}${d.getFullYear()}.REM`;
  a.download=nome;a.click();URL.revokeObjectURL(url);
  // Marcar fretes como enviados na remessa
  const nomeArq=nome;
  lote.forEach(f=>{f.remessa=nomeArq;});
  save();
  alerta={tipo:'ok',msg:`Arquivo "${nome}" gerado com ${lote.length} título${lote.length!==1?'s':''}! Envie pelo internet banking do SICOOB em Cobrança → Remessa.`};
  nav('remessa');
}

function exportarCSV(){
  function calcVencCSV(f){
    if(f.vencimento){const[y,m,d]=f.vencimento.split('-');return`${d}/${m}/${y}`;}
    if(!f.data)return'-';
    const d=new Date(f.data+'T00:00:00');d.setDate(d.getDate()+30);return d.toLocaleDateString('pt-BR');
  }
  function calcVencISO2(f){
    if(f.vencimento)return f.vencimento;
    if(!f.data)return'';
    const d=new Date(f.data+'T00:00:00');d.setDate(d.getDate()+30);return d.toISOString().slice(0,10);
  }
  const hoje=new Date().toISOString().slice(0,10);
  const comBoleto=fretes.filter(f=>f.boleto&&f.status!=='Cancelado');
  const selMes=relMes;const selAno=relAno||String(new Date().getFullYear());
  let lista=comBoleto.filter(f=>{
    const mesOk=!selMes||getMesAno(f.data)===`${selAno}-${selMes}`;
    const stOk=!filtroStatus||f.status===filtroStatus;
    return mesOk&&stOk;
  }).sort((a,b)=>calcVencISO2(a).localeCompare(calcVencISO2(b)));

  const linhas=[
    ['CONTROLE BANCÁRIO — '+EMPRESA.nome+' — CNPJ: '+EMPRESA.cnpj],
    ['Gerado em: '+new Date().toLocaleDateString('pt-BR')+(selMes?' — Período: '+getMesNome(`${selAno}-${selMes}`):'')],
    [],
    ['Vencimento','Empresa / Tomador','CNPJ/CPF','Serviço prestado','Número do boleto','Valor (R$)','Situação']
  ];
  lista.forEach(f=>{
    const venc=calcVencCSV(f);
    const vencISO=calcVencISO2(f);
    const vencido=f.status!=='Pago'&&vencISO<hoje;
    const sit=f.status==='Pago'?'PAGO':vencido?'VENCIDO':'PENDENTE';
    linhas.push([
      venc,
      f.tomador||'-',
      f.cnpj||'-',
      f.servico||'-',
      f.boleto||'-',
      Number(f.valor||0).toFixed(2).replace('.',','),
      sit
    ]);
  });
  const total=lista.reduce((s,f)=>s+Number(f.valor||0),0);
  const pago=lista.filter(f=>f.status==='Pago').reduce((s,f)=>s+Number(f.valor||0),0);
  const pend=lista.filter(f=>f.status!=='Pago').reduce((s,f)=>s+Number(f.valor||0),0);
  linhas.push([]);
  linhas.push(['','','','','TOTAL GERAL',total.toFixed(2).replace('.',','),'']);
  linhas.push(['','','','','RECEBIDO',pago.toFixed(2).replace('.',','),'']);
  linhas.push(['','','','','A RECEBER',pend.toFixed(2).replace('.',','),'']);

  const csv=linhas.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  const bom='\uFEFF';
  const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const periodo=selMes?`_${selAno}-${selMes}`:'';
  a.download=`controle_bancario${periodo}_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click();URL.revokeObjectURL(url);
}

function salvarCliente(){
  const nome=document.getElementById('cli-nome').value.trim();
  if(!nome){alerta={tipo:'err',msg:'Informe pelo menos o nome do cliente.'};render();return;}
  const novo={
    nome,
    cnpj:document.getElementById('cli-cnpj').value.trim(),
    origem:document.getElementById('cli-origem').value.trim(),
    destino:document.getElementById('cli-destino').value.trim(),
    tipo:document.getElementById('cli-tipo').value,
    pgto:document.getElementById('cli-pgto').value
  };
  clientes.push(novo);save();
  syncClienteFirebase(novo);
  alerta={tipo:'ok',msg:`Cliente "${nome}" cadastrado! Disponível no app dos motoristas.`};
  render();
}

function syncClienteFirebase(cli){
  if(!fbDb)return;
  const id=(cli.cnpj||'').replace(/\D/g,'')||cli.nome.replace(/\s/g,'_').toLowerCase();
  fbDb.collection('clientes_expresso').doc(id).set({
    nome:cli.nome,cnpj:cli.cnpj||'',origem:cli.origem||'',destino:cli.destino||'',
    tipo:cli.tipo||'faturado',pgto:cli.pgto||'',atualizadoEm:new Date().toISOString()
  },{merge:true}).catch(e=>console.log('Sync cliente erro:',e));
}

function syncTodosClientesFirebase(){
  if(!fbDb||!clientes.length)return;
  clientes.forEach(c=>syncClienteFirebase(c));
}

function excluirCliente(i){
  if(confirm(`Excluir cliente "${clientes[i].nome}"?`)){clientes.splice(i,1);save();alerta={tipo:'ok',msg:'Cliente excluído.'};render();}
}

function preencherCliente(idx){
  if(idx==='')return;
  const c=clientes[parseInt(idx)];
  if(!c)return;
  form.tomador=c.nome;
  form.cnpj=c.cnpj||'';
  form.origem=c.origem||'';
  form.destino=c.destino||'';
  form.tipo=c.tipo||'faturado';
  form.pagamento=c.pgto||'';
  form._cliIdx=parseInt(idx);
  renderForm();
}
