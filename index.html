<script>
const EMPRESA={nome:'Expresso Ricci',cnpj:'53.651.463/0001-80',tipo:'MEI — Transportador Autônomo',logradouro:'Rua Aurélio Campos, 427',bairro:'Piedade',cidade:'Itaúna',uf:'MG',cep:'35680-267',endFull:'Rua Aurélio Campos, 427 — Piedade, Itaúna/MG — CEP 35680-267'};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let fretes=[],clientes=[],form={tipo:'faturado'},docFrete=null,alerta=null,filtro='',filtroStatus='',filtroTipo='',pastaAberta=null,relGerado=null,relMes='',relAno='',tabAtual='dashboard';

function save(){localStorage.setItem('fretes_marco_v3',JSON.stringify(fretes));localStorage.setItem('clientes_marco',JSON.stringify(clientes));syncFretesFirebase();}
function load(){try{const d=localStorage.getItem('fretes_marco_v3');if(d)fretes=JSON.parse(d);}catch(e){}try{const c=localStorage.getItem('clientes_marco');if(c)clientes=JSON.parse(c);}catch(e){}}

// ═══ FIREBASE SYNC FRETES ═══
let syncTimer=null;
function syncFretesFirebase(){
  if(!fbDb)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{
    fbDb.collection('fretes_admin').doc('dados').set({
      fretes:JSON.stringify(fretes),
      clientes:JSON.stringify(clientes),
      atualizadoEm:new Date().toISOString()
    }).then(()=>{
      console.log('Backup Firebase OK - '+new Date().toLocaleTimeString());
    }).catch(e=>console.log('Sync erro:',e));
  },2000);
}

function carregarFretesFirebase(){
  if(!fbDb)return;
  fbDb.collection('fretes_admin').doc('dados').get().then(doc=>{
    if(doc.exists){
      const d=doc.data();
      try{
        const fbFretes=JSON.parse(d.fretes||'[]');
        const fbClientes=JSON.parse(d.clientes||'[]');
        // Se local está vazio mas Firebase tem dados, usa Firebase
        if(fretes.length===0&&fbFretes.length>0){
          fretes=fbFretes;
          localStorage.setItem('fretes_marco_v3',JSON.stringify(fretes));
        }
        if(clientes.length===0&&fbClientes.length>0){
          clientes=fbClientes;
          localStorage.setItem('clientes_marco',JSON.stringify(clientes));
        }
        // Se Firebase tem mais dados que local, merge
        if(fbFretes.length>fretes.length){
          fbFretes.forEach(ff=>{
            if(!fretes.find(f=>f.id===ff.id)){fretes.push(ff);}
          });
          localStorage.setItem('fretes_marco_v3',JSON.stringify(fretes));
        }
        if(fbClientes.length>clientes.length){
          fbClientes.forEach(fc=>{
            if(!clientes.find(c=>c.nome===fc.nome&&c.cnpj===fc.cnpj)){clientes.push(fc);}
          });
          localStorage.setItem('clientes_marco',JSON.stringify(clientes));
        }
        render();
        console.log('Dados Firebase carregados - Fretes:'+fbFretes.length+' Clientes:'+fbClientes.length);
      }catch(e){console.log('Parse Firebase erro:',e);}
    }
  }).catch(e=>console.log('Load Firebase erro:',e));
}

// ═══ EXPORT / IMPORT BACKUP ═══
function exportarBackup(){
  const dados={
    versao:'2.0',
    exportadoEm:new Date().toISOString(),
    empresa:EMPRESA.nome,
    fretes:fretes,
    clientes:clientes
  };
  const blob=new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='backup-expresso-ricci-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  alerta={tipo:'ok',msg:'Backup exportado com sucesso!'};
  render();
}

function importarBackup(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const dados=JSON.parse(ev.target.result);
        if(!dados.fretes||!dados.clientes){throw new Error('Formato inválido');}
        const totalFretes=dados.fretes.length;
        const totalClientes=dados.clientes.length;
        if(confirm(`Importar backup de ${dados.exportadoEm||'data desconhecida'}?\n\n${totalFretes} fretes e ${totalClientes} clientes.\n\nOs dados atuais serão SUBSTITUÍDOS.`)){
          fretes=dados.fretes;
          clientes=dados.clientes;
          save();
          alerta={tipo:'ok',msg:`Backup importado! ${totalFretes} fretes e ${totalClientes} clientes restaurados.`};
          render();
        }
      }catch(err){
        alerta={tipo:'err',msg:'Erro ao importar: arquivo inválido. Use um backup .json exportado pelo sistema.'};
        render();
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
function genId(){return'F'+Date.now().toString(36).toUpperCase();}
function genNFS(){return String(Math.floor(Math.random()*90000)+10000);}
function genBoleto(){const s=()=>Math.random().toString().slice(2,12);return`34191.${s().slice(0,5)} ${s().slice(0,5)}.${s().slice(0,6)} ${s().slice(0,5)}.${s().slice(0,6)} 1 ${Date.now().toString().slice(-14)}`;}
function fmtDate(d){if(!d)return'-';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function fmtMoney(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function getMesAno(d){return d?d.slice(0,7):'';}
function getMesNome(k){if(!k)return'';const[y,m]=k.split('-');return`${MESES[parseInt(m)-1]} / ${y}`;}
function totalMes(){const h=new Date();const k=`${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}`;return fretes.filter(f=>getMesAno(f.data)===k).reduce((s,f)=>s+Number(f.valor||0),0);}
function badgeSt(f){if(f.status==='Pago')return`<span class="badge b-pago"><i class="ti ti-check" style="font-size:10px"></i>Pago</span>`;if(f.status==='Cancelado')return`<span class="badge b-cancel"><i class="ti ti-x" style="font-size:10px"></i>Cancelado</span>`;if(f.nfs)return`<span class="badge b-nf"><i class="ti ti-file-invoice" style="font-size:10px"></i>NFS-e</span>`;return`<span class="badge b-pend"><i class="ti ti-clock" style="font-size:10px"></i>Pendente</span>`;}
function badgeTp(f){return f.tipo==='mensal'?`<span class="badge b-men"><i class="ti ti-calendar-month" style="font-size:10px"></i>Mensal</span>`:`<span class="badge b-fat"><i class="ti ti-file-dollar" style="font-size:10px"></i>Faturado</span>`;}

function nav(t){
  tabAtual=t;alerta=null;docFrete=null;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+t);if(nb)nb.classList.add('active');
  render();
}

function sf(k,v){form[k]=v;if(['descricao','servico','tipo'].includes(k))renderForm();}

function renderForm(){
  const f=form;const serv=f.servico||'';const desc=f.descricao||'';
  const el=document.getElementById('form-area');
  if(!el)return;

  const cliOptions=clientes.length
    ? clientes.map((c,i)=>`<option value="${i}" ${f._cliIdx==i?'selected':''}>${c.nome}${c.cnpj?' — '+c.cnpj:''}</option>`).join('')
    : '';

  el.innerHTML=`
  ${clientes.length?`<div class="field full" style="background:var(--blue-light);padding:12px;border-radius:var(--radius-sm);border:1px solid #C0D8F5">
    <label style="color:var(--blue)"><i class="ti ti-bolt" style="font-size:12px"></i> Seleção rápida de cliente</label>
    <select onchange="preencherCliente(this.value)" style="background:#fff;font-weight:600;color:var(--blue)">
      <option value="">Selecione um cliente cadastrado...</option>
      ${cliOptions}
    </select>
    <div style="font-size:11px;color:var(--blue);margin-top:4px;opacity:.8"><i class="ti ti-info-circle" style="font-size:11px"></i> Selecionar preencherá automaticamente os dados do cliente</div>
  </div>`:''}

  <div class="tipo-toggle">
    <button class="tipo-btn fat ${(!f.tipo||f.tipo==='faturado')?'sel':''}" onclick="sf('tipo','faturado')"><i class="ti ti-file-dollar"></i> Faturado <span style="font-size:11px;opacity:.7">(individual)</span></button>
    <button class="tipo-btn men ${f.tipo==='mensal'?'sel':''}" onclick="sf('tipo','mensal')"><i class="ti ti-calendar-month"></i> Mensal <span style="font-size:11px;opacity:.7">(agrupa por mês)</span></button>
  </div>
  ${f.tipo==='mensal'?'<p class="tipo-hint"><i class="ti ti-info-circle" style="font-size:12px"></i> Este lançamento será agrupado na pasta do mês correspondente e aparecerá no relatório mensal.</p>':''}

  <div class="section-sep"><span><i class="ti ti-calendar" style="font-size:11px"></i> Dados do serviço</span></div>
  <div class="field"><label>Data do serviço <span style="color:var(--red)">*</span></label><input type="date" value="${f.data||''}" onchange="sf('data',this.value)"></div>
  <div class="field"><label>Nº CTe / Ordem de serviço</label><input type="text" placeholder="Ex.: CTe 000123" value="${f.cte||''}" oninput="sf('cte',this.value)"></div>

  <div class="field full">
    <label>Serviço prestado <span style="color:var(--red)">*</span> <span class="badge-pill">Aparece na NFS-e</span></label>
    <input type="text" class="highlight" maxlength="150" placeholder="Ex.: Transporte de GLP P45 — Itaúna/MG para Divinópolis/MG" value="${serv}" oninput="sf('servico',this.value)">
    <div class="char-count">${serv.length}/150</div>
  </div>

  <div class="field full">
    <label>Descrição complementar</label>
    <textarea rows="2" maxlength="400" placeholder="Quantidade, tipo de carga, observações adicionais..." oninput="sf('descricao',this.value)" style="resize:vertical">${desc}</textarea>
    <div class="char-count">${desc.length}/400</div>
  </div>

  <div class="section-sep"><span><i class="ti ti-user" style="font-size:11px"></i> Tomador do serviço</span></div>
  <div class="field"><label>Nome / Razão social <span style="color:var(--red)">*</span></label><input type="text" placeholder="Nome do contratante" value="${f.tomador||''}" oninput="sf('tomador',this.value)"></div>
  <div class="field"><label>CNPJ / CPF</label><input type="text" placeholder="00.000.000/0001-00" value="${f.cnpj||''}" oninput="sf('cnpj',this.value)"></div>

  <div class="section-sep"><span><i class="ti ti-map-pin" style="font-size:11px"></i> Rota</span></div>
  <div class="field"><label>Origem <span style="color:var(--red)">*</span></label><input type="text" placeholder="Cidade/local de coleta" value="${f.origem||''}" oninput="sf('origem',this.value)"></div>
  <div class="field"><label>Destino <span style="color:var(--red)">*</span></label><input type="text" placeholder="Cidade/local de entrega" value="${f.destino||''}" oninput="sf('destino',this.value)"></div>
  <div class="field"><label>Veículo / Placa</label><input type="text" placeholder="ABC-1D23" value="${f.placa||''}" oninput="sf('placa',this.value.toUpperCase())" maxlength="8"></div>
  <div class="field"><label>Distância (km)</label><input type="number" placeholder="0" value="${f.km||''}" oninput="sf('km',this.value)" min="0"></div>

  <div class="section-sep"><span><i class="ti ti-currency-dollar" style="font-size:11px"></i> Financeiro</span></div>
  <div class="field"><label>Valor do frete (R$) <span style="color:var(--red)">*</span></label><input type="number" placeholder="0,00" value="${f.valor||''}" oninput="sf('valor',this.value)" min="0" step="0.01"></div>
  <div class="field"><label>Data de vencimento <span style="color:var(--red)">*</span> <span class="badge-pill" style="background:#FEF0DA;color:var(--amber)">Controle bancário</span></label>
    <input type="date" value="${f.vencimento||''}" onchange="sf('vencimento',this.value)" style="border-color:${f.vencimento?'var(--blue)':'var(--gray-3)'}">
    ${!f.vencimento&&f.data?`<div style="font-size:11px;color:var(--gray-4);margin-top:2px"><i class="ti ti-info-circle" style="font-size:11px"></i> Sugestão: <button onclick="sf('vencimento',sugerirVenc('${f.data}'));renderForm()" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;padding:0">usar +30 dias (${sugerirVencFmt('${f.data}')})</button></div>`:''}
  </div>
  <div class="field"><label>Forma de pagamento</label>
    <select onchange="sf('pagamento',this.value)">
      <option value="">Selecione...</option>
      ${['PIX','Transferência bancária','Dinheiro','Boleto','Cheque'].map(p=>`<option value="${p}" ${f.pagamento===p?'selected':''}>${p}</option>`).join('')}
    </select>
  </div>`;
}

function render(){
  const el=document.getElementById('nb-count');if(el)el.textContent=fretes.filter(f=>f.status!=='Cancelado').length;
  const em=document.getElementById('nb-men-count');if(em)em.textContent=fretes.filter(f=>f.tipo==='mensal'&&f.status!=='Cancelado').length;
  const ec=document.getElementById('nb-cli-count');if(ec)ec.textContent=clientes.length;

  const main=document.getElementById('main');
  let h='';

  if(alerta){
    h+=`<div class="alert ${alerta.tipo==='ok'?'alert-ok':'alert-err'}"><i class="ti ti-${alerta.tipo==='ok'?'check':'alert-circle'}"></i>${alerta.msg}</div>`;
    setTimeout(()=>{alerta=null;render();},3800);
  }

  // DASHBOARD
  if(tabAtual==='dashboard'){
    h+=`<div class="page-header"><div class="page-title">Dashboard</div><div class="page-sub">${EMPRESA.endFull}</div></div>`;
    const pend=fretes.filter(f=>f.status==='Pendente').length;
    const nfsN=fretes.filter(f=>f.nfs).length;
    const mens=fretes.filter(f=>f.tipo==='mensal'&&f.status!=='Cancelado').length;
    h+=`<div class="stats">
      <div class="stat"><div class="stat-label"><i class="ti ti-truck"></i> Total fretes</div><div class="stat-val blue">${fretes.filter(f=>f.status!=='Cancelado').length}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-calendar-month"></i> Receita do mês</div><div class="stat-val blue">${fmtMoney(totalMes())}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-clock"></i> Pendentes</div><div class="stat-val amber">${pend}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-file-invoice"></i> NFS-e emitidas</div><div class="stat-val blue">${nfsN}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-folders"></i> Mensais</div><div class="stat-val purple">${mens}</div></div>
    </div>`;
    const rec=[...fretes].sort((a,b)=>b.criadoEm-a.criadoEm).slice(0,6);
    h+=`<div class="card"><div class="card-title"><i class="ti ti-history"></i> Últimos lançamentos</div>`;
    if(!rec.length)h+=`<div class="empty"><i class="ti ti-truck"></i>Nenhum lançamento ainda.<br><small>Clique em "Novo lançamento" para começar.</small></div>`;
    else{
      h+=`<div class="table-wrap"><table><thead><tr><th>Data</th><th>Tomador</th><th>Serviço prestado</th><th>Valor</th><th>Tipo</th><th>Status</th></tr></thead><tbody>`;
      rec.forEach(f=>{h+=`<tr><td style="white-space:nowrap">${fmtDate(f.data)}</td><td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.tomador||'-'}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.servico||'-'}</td><td style="font-weight:700;white-space:nowrap">${fmtMoney(f.valor)}</td><td>${badgeTp(f)}</td><td>${badgeSt(f)}</td></tr>`;});
      h+=`</tbody></table></div>`;
    }
    h+=`</div>`;
  }

  // NOVO
  if(tabAtual==='novo'){
    h+=`<div class="page-header"><div class="page-title">Novo lançamento</div><div class="page-sub">Preencha os dados do frete</div></div>`;
    h+=`<div class="card"><div class="form-grid" id="form-area"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-2)">
      <button class="btn btn-sec" onclick="limpar()"><i class="ti ti-x"></i> Limpar</button>
      <button class="btn btn-primary" onclick="salvar()"><i class="ti ti-check"></i> Salvar lançamento</button>
    </div></div>`;
  }

  // FRETES
  if(tabAtual==='fretes'){
    h+=`<div class="page-header"><div class="page-title">Todos os fretes</div></div>`;
    h+=`<div class="card">
    <div class="filter-row">
      <input type="text" placeholder="Buscar tomador ou serviço..." value="${filtro}" oninput="filtro=this.value;render()">
      <select onchange="filtroStatus=this.value;render()">
        <option value="">Todos os status</option>
        <option value="Pendente" ${filtroStatus==='Pendente'?'selected':''}>Pendente</option>
        <option value="Pago" ${filtroStatus==='Pago'?'selected':''}>Pago</option>
        <option value="Cancelado" ${filtroStatus==='Cancelado'?'selected':''}>Cancelado</option>
      </select>
      <select onchange="filtroTipo=this.value;render()">
        <option value="">Todos os tipos</option>
        <option value="faturado" ${filtroTipo==='faturado'?'selected':''}>Faturado</option>
        <option value="mensal" ${filtroTipo==='mensal'?'selected':''}>Mensal</option>
      </select>
    </div>`;
    let lista=fretes.filter(f=>{
      const t=`${f.tomador} ${f.servico} ${f.origem} ${f.destino}`.toLowerCase();
      return(!filtro||t.includes(filtro.toLowerCase()))&&(!filtroStatus||f.status===filtroStatus)&&(!filtroTipo||f.tipo===filtroTipo);
    }).sort((a,b)=>b.criadoEm-a.criadoEm);
    if(!lista.length)h+=`<div class="empty"><i class="ti ti-search"></i>Nenhum frete encontrado.</div>`;
    else{
      h+=`<div class="table-wrap"><table><thead><tr><th>Data</th><th>Tomador</th><th>Serviço prestado</th><th>Valor</th><th>Tipo</th><th>NFS-e</th><th>Status</th><th>Ações</th></tr></thead><tbody>`;
      lista.forEach(f=>{
        h+=`<tr>
          <td style="white-space:nowrap">${fmtDate(f.data)}</td>
          <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.tomador||'-'}</td>
          <td style="max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.servico||'-'}</td>
          <td style="font-weight:700;white-space:nowrap">${fmtMoney(f.valor)}</td>
          <td>${badgeTp(f)}</td>
          <td style="font-size:12px">${f.nfs?`<span style="color:var(--blue);font-weight:700">#${f.nfs}</span>`:'-'}</td>
          <td>${badgeSt(f)}</td>
          <td><div class="action-row">
            ${f.status!=='Cancelado'&&f.status!=='Pago'?`<button class="btn btn-sec btn-sm" onclick="marcarPago('${f.id}')" title="Marcar pago"><i class="ti ti-check"></i></button>`:''}
            <button class="btn btn-danger btn-sm" onclick="cancelar('${f.id}')" title="Excluir"><i class="ti ti-trash"></i></button>
          </div></td>
        </tr>`;
      });
      h+=`</tbody></table></div>`;
    }
    h+=`</div>`;
  }

  // MENSAL
  if(tabAtual==='mensal'){
    h+=`<div class="page-header"><div class="page-title">Pasta mensal</div><div class="page-sub">Fretes agrupados por mês e por cliente para fechamento</div></div>`;
    const mens=fretes.filter(f=>f.tipo==='mensal'&&f.status!=='Cancelado');
    const grupos={};
    mens.forEach(f=>{const k=getMesAno(f.data);if(!grupos[k])grupos[k]=[];grupos[k].push(f);});
    const chaves=Object.keys(grupos).sort((a,b)=>b.localeCompare(a));
    if(!chaves.length){
      h+=`<div class="card"><div class="empty"><i class="ti ti-folder-off"></i>Nenhum frete mensal lançado ainda.<br><small>Ao lançar um frete com tipo "Mensal", ele aparecerá aqui agrupado por mês e por cliente.</small></div></div>`;
    } else {
      chaves.forEach(k=>{
        const itens=grupos[k];
        const total=itens.reduce((s,f)=>s+Number(f.valor||0),0);
        const ab=pastaAberta===k;
        // Agrupar por cliente (tomador)
        const porCliente={};
        itens.forEach(f=>{const cli=f.tomador||f.cnpj||'Sem cliente';if(!porCliente[cli])porCliente[cli]=[];porCliente[cli].push(f);});
        const cliKeys=Object.keys(porCliente).sort();
        h+=`<div class="pasta">
          <div class="pasta-header" onclick="togglePasta('${k}')">
            <div class="pasta-titulo"><i class="ti ti-folder${ab?'-open':''}" style="color:var(--blue);font-size:18px"></i>${getMesNome(k)}</div>
            <div class="pasta-meta">
              <span style="color:var(--gray-4)">${cliKeys.length} cliente${cliKeys.length>1?'s':''} · ${itens.length} frete${itens.length>1?'s':''}</span>
              <span style="font-weight:700;color:var(--blue)">${fmtMoney(total)}</span>
              <button class="btn btn-green btn-sm" onclick="event.stopPropagation();gerarRel('${k}')"><i class="ti ti-report"></i> Relatório</button>
              <i class="ti ti-chevron-${ab?'up':'down'}" style="color:var(--gray-4)"></i>
            </div>
          </div>
          <div class="pasta-body ${ab?'open':''}">`;
        cliKeys.forEach(cli=>{
          const cliItens=porCliente[cli];
          const cliTotal=cliItens.reduce((s,f)=>s+Number(f.valor||0),0);
          const cliCnpj=cliItens[0].cnpj||'';
          h+=`<div style="margin-top:14px;border:1px solid var(--gray-2);border-radius:var(--radius-sm);overflow:hidden">
            <div style="padding:10px 14px;background:var(--blue-light);display:flex;justify-content:space-between;align-items:center">
              <div>
                <span style="font-weight:700;color:var(--blue);font-size:14px"><i class="ti ti-building" style="font-size:13px"></i> ${cli}</span>
                ${cliCnpj?`<span style="font-size:11px;color:var(--gray-4);margin-left:8px">${cliCnpj}</span>`:''}
              </div>
              <div style="text-align:right">
                <span style="font-size:12px;color:var(--gray-4)">${cliItens.length} frete${cliItens.length>1?'s':''}</span>
                <span style="font-weight:700;color:var(--blue);margin-left:8px">${fmtMoney(cliTotal)}</span>
              </div>
            </div>
            <table><thead><tr><th>Data</th><th>Serviço prestado</th><th>Rota</th><th>Valor</th><th>NF</th><th>Status</th></tr></thead><tbody>`;
          cliItens.sort((a,b)=>a.data.localeCompare(b.data)).forEach(f=>{
            h+=`<tr><td style="white-space:nowrap">${fmtDate(f.data)}</td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.servico||'-'}</td><td style="font-size:11px;color:var(--gray-4)">${f.origem||'-'} → ${f.destino||'-'}</td><td style="font-weight:700">${fmtMoney(f.valor)}</td><td style="font-size:12px">${f.nfs?`<span style="color:var(--blue);font-weight:700">#${f.nfs}</span>`:'-'}</td><td>${badgeSt(f)}</td></tr>`;
          });
          h+=`</tbody></table></div>`;
        });
        h+=`</div></div>`;
      });
    }
  }

  // RELATÓRIO
  if(tabAtual==='relatorio'){
    const hoje=new Date();
    const selMes=relMes||String(hoje.getMonth()+1).padStart(2,'0');
    const selAno=relAno||String(hoje.getFullYear());
    const chave=`${selAno}-${selMes}`;
    const anos=[...new Set(fretes.map(f=>f.data?f.data.slice(0,4):null).filter(Boolean))];
    if(!anos.includes(String(hoje.getFullYear())))anos.push(String(hoje.getFullYear()));
    anos.sort((a,b)=>b-a);
    h+=`<div class="page-header"><div class="page-title">Relatório mensal</div><div class="page-sub">Resumo de datas, valores e serviços prestados</div></div>`;
    h+=`<div class="card">
    <div class="filter-row" style="margin-bottom:0">
      <select onchange="relMes=this.value;relGerado=null;render()" style="min-width:130px">
        ${MESES.map((m,i)=>{const v=String(i+1).padStart(2,'0');return`<option value="${v}" ${selMes===v?'selected':''}>${m}</option>`;}).join('')}
      </select>
      <select onchange="relAno=this.value;relGerado=null;render()">
        ${anos.map(a=>`<option value="${a}" ${selAno===a?'selected':''}>${a}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="gerarRel('${chave}')"><i class="ti ti-search"></i> Gerar relatório</button>
    </div></div>`;

    if(relGerado&&relGerado.chave===chave){
      const itens=relGerado.itens;
      const totalG=itens.reduce((s,f)=>s+Number(f.valor||0),0);
      const totalPago=itens.filter(f=>f.status==='Pago').reduce((s,f)=>s+Number(f.valor||0),0);
      h+=`<div class="rel-wrap">
        <div class="rel-header">
          <div class="rel-header-title"><i class="ti ti-report"></i> ${getMesNome(chave)}</div>
          <div class="rel-header-sub">${EMPRESA.nome} · CNPJ ${EMPRESA.cnpj}</div>
        </div>
        <div class="rel-body">
          <div class="rel-sumario">
            <div class="rel-sum-item"><div class="rel-sum-label">Total de serviços</div><div class="rel-sum-val">${itens.length}</div></div>
            <div class="rel-sum-item"><div class="rel-sum-label">Valor total</div><div class="rel-sum-val">${fmtMoney(totalG)}</div></div>
            <div class="rel-sum-item"><div class="rel-sum-label" style="color:var(--green)">Recebido</div><div class="rel-sum-val" style="color:var(--green)">${fmtMoney(totalPago)}</div></div>
          </div>`;
      if(!itens.length){
        h+=`<div class="empty" style="padding:2rem"><i class="ti ti-file-off"></i>Nenhum serviço lançado neste período.</div>`;
      } else {
        h+=`<table class="rel-table"><thead><tr><th>Data</th><th>Tomador</th><th>Serviço prestado</th><th>Tipo</th><th>NFS-e</th><th>Valor</th><th>Status</th></tr></thead><tbody>`;
        itens.sort((a,b)=>a.data.localeCompare(b.data)).forEach(f=>{
          h+=`<tr>
            <td style="white-space:nowrap">${fmtDate(f.data)}</td>
            <td>${f.tomador||'-'}</td>
            <td>${f.servico||'-'}${f.descricao?`<br><span style="font-size:11px;color:var(--gray-4)">${f.descricao.slice(0,80)}${f.descricao.length>80?'…':''}</span>`:''}</td>
            <td>${badgeTp(f)}</td>
            <td style="font-size:12px">${f.nfs?`<span style="color:var(--blue);font-weight:700">#${f.nfs}</span>`:'-'}</td>
            <td style="font-weight:700;white-space:nowrap">${fmtMoney(f.valor)}</td>
            <td>${badgeSt(f)}</td>
          </tr>`;
        });
        h+=`<tr class="total-row"><td colspan="5" style="text-align:right;padding:10px 12px">TOTAL DO PERÍODO</td><td style="padding:10px 12px;font-weight:800;color:var(--blue)">${fmtMoney(totalG)}</td><td></td></tr>`;
        h+=`</tbody></table>`;
      }
      h+=`<div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn btn-sec" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir relatório</button></div>`;
      h+=`</div></div>`;
    }
  }

  // MOTORISTAS
  if(tabAtual==='motoristas'){
    h+=`<div class="page-header">
      <div class="page-title">Registros dos motoristas</div>
      <div class="page-sub">Fretes enviados pelos motoristas — aprove para lançar no sistema</div>
    </div>`;

    if(!fbConfigOk){
      h+=`<div class="card" style="text-align:center;padding:32px">
        <i class="ti ti-settings" style="font-size:48px;color:var(--amber);display:block;margin-bottom:12px"></i>
        <div style="font-size:17px;font-weight:700;color:var(--amber);margin-bottom:8px">Firebase não configurado</div>
        <div style="font-size:13px;color:var(--gray-4);line-height:1.7;max-width:400px;margin:0 auto">
          Adicione as credenciais do Firebase no topo do arquivo <strong>index.html</strong>.<br>
          Consulte o <strong>README.md</strong> para instruções passo a passo.
        </div>
      </div>`;
    } else {
      const pendMot = (window._motFretes||[]).filter(f=>f.status==='pendente');
      const todosMot = window._motFretes||[];

      // Stats
      h+=`<div class="stats" style="margin-bottom:16px">
        <div class="stat"><div class="stat-label"><i class="ti ti-clock"></i> Aguardando aprovação</div><div class="stat-val amber">${pendMot.length}</div></div>
        <div class="stat"><div class="stat-label"><i class="ti ti-check"></i> Aprovados hoje</div><div class="stat-val green">${todosMot.filter(f=>f.status==='aprovado'&&f._dataAprov===hoje()).length}</div></div>
        <div class="stat"><div class="stat-label"><i class="ti ti-users"></i> Total recebido</div><div class="stat-val blue">${todosMot.length}</div></div>
      </div>`;

      // Filtro
      h+=`<div class="card">
        <div class="card-title" style="margin-bottom:12px"><i class="ti ti-inbox"></i> Todos os registros</div>
        <div class="filter-row">
          <select onchange="filtroMotStatus=this.value;render()" style="font-size:13px;padding:8px 12px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);background:#fff;color:var(--gray-6)">
            <option value="">Todos os status</option>
            <option value="pendente" ${filtroMotStatus==='pendente'?'selected':''}>Aguardando</option>
            <option value="aprovado" ${filtroMotStatus==='aprovado'?'selected':''}>Aprovados</option>
            <option value="rejeitado" ${filtroMotStatus==='rejeitado'?'selected':''}>Rejeitados</option>
          </select>
          <select onchange="filtroMotMot=this.value;render()" style="font-size:13px;padding:8px 12px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);background:#fff;color:var(--gray-6)">
            <option value="">Todos os motoristas</option>
            ${[...new Set(todosMot.map(f=>f.motorista))].map(m=>`<option value="${m}" ${filtroMotMot===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>`;

      let lista=(window._motFretes||[]).filter(f=>{
        const s1=!filtroMotStatus||f.status===filtroMotStatus;
        const s2=!filtroMotMot||f.motorista===filtroMotMot;
        return s1&&s2;
      });

      if(!lista.length){
        h+=`<div class="empty" style="padding:2rem"><i class="ti ti-inbox-off"></i>Nenhum registro encontrado.<br><small>Os fretes enviados pelos motoristas aparecerão aqui em tempo real.</small></div>`;
      } else {
        lista.forEach(f=>{
          const dt=f.datetime?(f.datetime.slice(8,10)+'/'+f.datetime.slice(5,7)+'/'+f.datetime.slice(0,4)):'-';
          const hr=f.datetime?f.datetime.slice(11,16):'-';
          const isPend=f.status==='pendente';
          const isAprov=f.status==='aprovado';
          h+=`<div style="border:1px solid ${isPend?'#F0D080':isAprov?'#B8DDA8':var_gray3()};border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;background:${isPend?'#FFFBF0':isAprov?'#F6FFF0':'#fff'}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                  <span style="font-size:13px;font-weight:700;background:var(--blue-light);color:var(--blue);padding:3px 10px;border-radius:20px"><i class="ti ti-user-circle" style="font-size:11px"></i> ${f.motorista}</span>
                  <span style="font-size:12px;color:var(--gray-4)">${dt} às ${hr}</span>
                  ${f.tipo==='mensal'?`<span style="font-size:11px;background:#EEE6FB;color:#5A1D9A;padding:2px 8px;border-radius:20px;font-weight:600">Mensal</span>`:`<span style="font-size:11px;background:var(--green-light);color:var(--green);padding:2px 8px;border-radius:20px;font-weight:600">Faturado</span>`}
                </div>
                <div style="font-size:14px;font-weight:600;margin-bottom:4px">${f.servico||'-'}</div>
                <div style="font-size:13px;margin-bottom:3px"><i class="ti ti-building" style="font-size:11px;color:var(--blue)"></i> <strong>Remetente:</strong> ${f.remetente||'-'} &nbsp;→&nbsp; <strong>Destinatário:</strong> ${f.destinatario||'-'}</div>
                <div style="font-size:12px;margin-bottom:3px;color:var(--amber);font-weight:600"><i class="ti ti-cash" style="font-size:11px"></i> Paga: ${f.pagadorNome||'-'}</div>
                <div style="font-size:12px;color:var(--gray-4)"><i class="ti ti-map-pin" style="font-size:11px"></i> ${f.origem||'-'} → ${f.destino||'-'}</div>
                ${f.formaPgto&&f.tipo==='faturado'?`<div style="font-size:12px;margin-top:3px"><i class="ti ti-cash" style="font-size:11px;color:var(--green)"></i> <strong>${{'avista':'À vista','pix':'PIX','boleto':'Boleto'}[f.formaPgto]||f.formaPgto}</strong></div>`:''}
                ${f.emitirNF==='sim'?`<div style="font-size:12px;margin-top:3px;color:var(--blue);font-weight:600"><i class="ti ti-file-invoice" style="font-size:11px"></i> NF solicitada</div>`:''}
                ${f.obs?`<div style="font-size:12px;color:var(--gray-4);margin-top:4px"><i class="ti ti-note" style="font-size:11px"></i> ${f.obs}</div>`:''}
                ${f.vencimento?`<div style="font-size:12px;margin-top:4px;font-weight:600;color:var(--amber)"><i class="ti ti-calendar-event" style="font-size:11px"></i> Vencimento: ${f.vencimento.split('-').reverse().join('/')} (${f.prazoVenc||'?'} dias)</div>`:''}
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:20px;font-weight:800;color:var(--blue)">${fmtMoney(f.valor)}</div>
                ${isPend
                  ?`<div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
                      <button class="btn btn-danger btn-sm" onclick="rejeitarMot('${f._id}')"><i class="ti ti-x"></i> Rejeitar</button>
                      <button class="btn btn-green btn-sm" onclick="aprovarMot('${f._id}')"><i class="ti ti-check"></i> Aprovar</button>
                    </div>`
                  :isAprov
                    ?`<span class="badge b-pago" style="margin-top:6px;display:inline-flex"><i class="ti ti-check" style="font-size:10px"></i>Aprovado</span>`
                    :`<span class="badge b-cancel" style="margin-top:6px;display:inline-flex"><i class="ti ti-x" style="font-size:10px"></i>Rejeitado</span>`
                }
              </div>
            </div>
          </div>`;
        });
      }
      h+=`</div>`;
    }
  }

  // CONTROLE BANCÁRIO
  if(tabAtual==='controle'){
    const hoje=new Date();
    const selMes=relMes||String(hoje.getMonth()+1).padStart(2,'0');
    const selAno=relAno||String(hoje.getFullYear());
    const anos=[...new Set(fretes.map(f=>f.data?f.data.slice(0,4):null).filter(Boolean))];
    if(!anos.includes(String(hoje.getFullYear())))anos.push(String(hoje.getFullYear()));
    anos.sort((a,b)=>b-a);

    // Todos os fretes com boleto
    const comBoleto=fretes.filter(f=>f.boleto&&f.status!=='Cancelado');
    // Filtro por período se selecionado
    const chaveCtrl=`${selAno}-${selMes}`;
    const [filtroCtrlMes,setFiltroCtrlMes]=[relMes,v=>{relMes=v;}];

    // Usa vencimento do lançamento, ou fallback +30 dias
    function calcVenc(f){
      if(f.vencimento){const[y,m,d]=f.vencimento.split('-');return`${d}/${m}/${y}`;}
      if(!f.data)return'-';
      const d=new Date(f.data+'T00:00:00');d.setDate(d.getDate()+30);return d.toLocaleDateString('pt-BR');
    }
    function calcVencISO(f){
      if(f.vencimento)return f.vencimento;
      if(!f.data)return'';
      const d=new Date(f.data+'T00:00:00');d.setDate(d.getDate()+30);return d.toISOString().slice(0,10);
    }

    // Opções de filtro período
    h+=`<div class="page-header"><div class="page-title">Controle bancário</div><div class="page-sub">Conferência de boletos — quem pagou e quem está pendente</div></div>`;

    // Filtros
    h+=`<div class="card" style="padding:18px 24px">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select id="ctrl-mes" onchange="relMes=this.value;render()" style="padding:8px 12px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif">
        <option value="">Todos os meses</option>
        ${MESES.map((m,i)=>{const v=String(i+1).padStart(2,'0');return`<option value="${v}" ${selMes===v&&relMes?'selected':''}>${m}</option>`;}).join('')}
      </select>
      <select id="ctrl-ano" onchange="relAno=this.value;render()" style="padding:8px 12px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif">
        ${anos.map(a=>`<option value="${a}" ${selAno===a?'selected':''}>${a}</option>`).join('')}
      </select>
      <select id="ctrl-status" onchange="filtroStatus=this.value;render()" style="padding:8px 12px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif">
        <option value="">Todos (pago + pendente)</option>
        <option value="Pendente" ${filtroStatus==='Pendente'?'selected':''}>Apenas pendentes</option>
        <option value="Pago" ${filtroStatus==='Pago'?'selected':''}>Apenas pagos</option>
      </select>
      <button class="btn btn-primary" onclick="exportarCSV()"><i class="ti ti-table-export"></i> Exportar CSV</button>
      <button class="btn btn-sec" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir</button>
    </div></div>`;

    // Monta lista filtrada
    let listaCtrl=comBoleto.filter(f=>{
      const mesOk=!relMes||getMesAno(f.data)===`${selAno}-${selMes}`;
      const stOk=!filtroStatus||f.status===filtroStatus;
      return mesOk&&stOk;
    }).sort((a,b)=>calcVencISO(a).localeCompare(calcVencISO(b)));

    const totalGeral=listaCtrl.reduce((s,f)=>s+Number(f.valor||0),0);
    const totalPago=listaCtrl.filter(f=>f.status==='Pago').reduce((s,f)=>s+Number(f.valor||0),0);
    const totalPend=listaCtrl.filter(f=>f.status!=='Pago').reduce((s,f)=>s+Number(f.valor||0),0);
    const qtdPago=listaCtrl.filter(f=>f.status==='Pago').length;
    const qtdPend=listaCtrl.filter(f=>f.status!=='Pago').length;

    // Cards de resumo
    h+=`<div class="stats" style="margin-bottom:16px">
      <div class="stat"><div class="stat-label"><i class="ti ti-receipt"></i> Total boletos</div><div class="stat-val blue">${listaCtrl.length}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-check"></i> Pagos</div><div class="stat-val green">${qtdPago}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-clock"></i> Pendentes</div><div class="stat-val amber">${qtdPend}</div></div>
      <div class="stat"><div class="stat-label"><i class="ti ti-currency-dollar"></i> Total geral</div><div class="stat-val blue">${fmtMoney(totalGeral)}</div></div>
      <div class="stat"><div class="stat-label" style="color:var(--green)"><i class="ti ti-check"></i> Recebido</div><div class="stat-val green">${fmtMoney(totalPago)}</div></div>
      <div class="stat"><div class="stat-label" style="color:var(--amber)"><i class="ti ti-alert-circle"></i> A receber</div><div class="stat-val amber">${fmtMoney(totalPend)}</div></div>
    </div>`;

    if(!listaCtrl.length){
      h+=`<div class="card"><div class="empty"><i class="ti ti-receipt-off"></i>Nenhum boleto encontrado para o período selecionado.<br><small>Emita boletos na aba "Emitir boleto" para eles aparecerem aqui.</small></div></div>`;
    } else {
      h+=`<div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 20px;background:var(--gray-1);border-bottom:1px solid var(--gray-2);display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:700;font-size:14px;color:var(--gray-6)"><i class="ti ti-building-bank" style="color:var(--blue)"></i> Relatório de boletos${relMes?' — '+getMesNome(chaveCtrl):''}</span>
        <span style="font-size:12px;color:var(--gray-4)">${listaCtrl.length} registro${listaCtrl.length>1?'s':''}</span>
      </div>
      <div class="table-wrap">
      <table id="tabela-controle">
        <thead>
          <tr>
            <th>Vencimento</th>
            <th>Empresa / Tomador</th>
            <th>Serviço prestado</th>
            <th>Nº do boleto</th>
            <th>Valor</th>
            <th>Situação</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody>`;

      listaCtrl.forEach(f=>{
        const venc=calcVencISO(f);
        const vencFmt=calcVenc(f);
        const hoje2=new Date().toISOString().slice(0,10);
        const vencido=f.status!=='Pago'&&venc<hoje2;
        const pago=f.status==='Pago';
        h+=`<tr style="${vencido?'background:#FFF8F8;':pago?'background:#F6FFF0;':''}">
          <td style="white-space:nowrap;font-weight:${vencido?'700':'500'};color:${vencido?'var(--red)':pago?'var(--green)':'var(--gray-6)'}">
            ${vencFmt}
            ${vencido?`<br><span style="font-size:10px;color:var(--red);font-weight:700"><i class="ti ti-alert-circle" style="font-size:10px"></i> VENCIDO</span>`:''}
          </td>
          <td style="font-weight:600;max-width:150px">${f.tomador||'-'}<br><span style="font-size:11px;font-weight:400;color:var(--gray-4)">${f.cnpj||''}</span></td>
          <td style="font-size:12px;max-width:180px;word-break:break-word;white-space:normal">${f.servico||'-'}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px;max-width:200px;word-break:break-all;white-space:normal;color:var(--blue)">${f.boleto||'-'}</td>
          <td style="font-weight:700;white-space:nowrap;font-size:15px;color:${pago?'var(--green)':'var(--gray-6)'}">${fmtMoney(f.valor)}</td>
          <td>
            ${pago
              ?`<span class="badge b-pago"><i class="ti ti-check" style="font-size:10px"></i>Pago</span>`
              :vencido
                ?`<span class="badge" style="background:#FCEAEA;color:var(--red)"><i class="ti ti-alert-circle" style="font-size:10px"></i>Vencido</span>`
                :`<span class="badge b-pend"><i class="ti ti-clock" style="font-size:10px"></i>Pendente</span>`
            }
          </td>
          <td>
            ${!pago?`<button class="btn btn-green btn-sm" onclick="marcarPago('${f.id}')"><i class="ti ti-check"></i> Pago</button>`
              :`<span style="font-size:11px;color:var(--green)"><i class="ti ti-check-circle"></i> Confirmado</span>`}
          </td>
        </tr>`;
      });

      h+=`</tbody>
        <tfoot>
          <tr style="background:var(--blue-light);font-weight:700">
            <td colspan="4" style="padding:12px 12px;text-align:right;color:var(--blue)">TOTAL</td>
            <td style="padding:12px;color:var(--blue);font-size:15px">${fmtMoney(totalGeral)}</td>
            <td colspan="2" style="padding:12px;font-size:12px;color:var(--blue)">Recebido: ${fmtMoney(totalPago)} &nbsp;|&nbsp; A receber: ${fmtMoney(totalPend)}</td>
          </tr>
        </tfoot>
      </table></div></div>`;
    }
  }

  // REMESSA CNAB 240
  if(tabAtual==='remessa'){
    const pendRem = fretes.filter(f=>f.boleto&&f.status!=='Cancelado'&&!f.remessa);
    const enviados = fretes.filter(f=>f.remessa);

    h+=`<div class="page-header"><div class="page-title">Remessa CNAB 240 — SICOOB</div><div class="page-sub">Gere o arquivo .REM para enviar ao SICOOB pelo internet banking</div></div>`;

    // Config card
    h+=`<div class="card" style="border-left:4px solid var(--blue)">
      <div class="card-title" style="margin-bottom:10px"><i class="ti ti-settings"></i> Dados identificados no boleto</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;font-size:13px">
        ${[
          ['Banco','756 — SICOOB'],
          ['Cooperativa','4101 — SICOOB CENTRO-OESTE'],
          ['Cód. beneficiário','1947729'],
          ['Carteira','01'],
          ['CNPJ','53.651.463/0001-80'],
          ['Layout','CNAB 240']
        ].map(([l,v])=>`<div style="background:var(--gray-1);border-radius:var(--radius-sm);padding:10px 12px"><div style="font-size:10px;color:var(--gray-4);font-weight:600;text-transform:uppercase;margin-bottom:3px">${l}</div><div style="font-weight:700;color:var(--blue)">${v}</div></div>`).join('')}
      </div>
      <div style="margin-top:12px;padding:10px 12px;background:#FEF8E6;border-radius:var(--radius-sm);border:1px solid #F0D080;font-size:12px;color:#7A5000">
        <i class="ti ti-alert-triangle" style="font-size:13px"></i> <strong>Importante:</strong> Confirme com sua cooperativa SICOOB o DV da agência e da conta antes de usar em produção. O arquivo gerado segue o layout CNAB 240 padrão FEBRABAN homologado pelo SICOOB.
      </div>
    </div>`;

    // Boletos para remessa
    h+=`<div class="card"><div class="card-title"><i class="ti ti-checklist"></i> Boletos disponíveis para remessa <span style="font-size:13px;font-weight:400;color:var(--gray-4)">(${pendRem.length} pendente${pendRem.length!==1?'s':''})</span></div>`;

    if(!pendRem.length){
      h+=`<div class="empty" style="padding:2rem"><i class="ti ti-file-off"></i>Nenhum boleto pendente de remessa.<br><small>Boletos já enviados ou fretes sem boleto não aparecem aqui.</small></div>`;
    } else {
      h+=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <button class="btn btn-sec btn-sm" onclick="selecionarTodos(true)"><i class="ti ti-checkbox"></i> Selecionar todos</button>
        <button class="btn btn-sec btn-sm" onclick="selecionarTodos(false)"><i class="ti ti-square"></i> Limpar seleção</button>
        <span style="font-size:12px;color:var(--gray-4);margin-left:auto" id="count-sel">0 selecionados</span>
      </div>
      <div class="table-wrap">
      <table id="tab-remessa"><thead><tr>
        <th style="width:40px"><input type="checkbox" id="chk-all" onchange="selecionarTodos(this.checked)"></th>
        <th>Vencimento</th><th>Tomador</th><th>Serviço prestado</th><th>Nº boleto (resumido)</th><th>Valor</th>
      </tr></thead><tbody>`;
      pendRem.forEach(f=>{
        let vencStr='-';
        if(f.vencimento){const[vy,vm,vd]=f.vencimento.split('-');vencStr=`${vd}/${vm}/${vy}`;}
        const boletoCurto=(f.boleto||'').replace(/\s/g,'').slice(-10);
        h+=`<tr>
          <td><input type="checkbox" class="chk-boleto" data-id="${f.id}" onchange="atualizarContSel()"></td>
          <td style="white-space:nowrap;font-weight:600">${vencStr}</td>
          <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${f.tomador||'-'}</td>
          <td style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.servico||'-'}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--blue)">...${boletoCurto}</td>
          <td style="font-weight:700">${fmtMoney(f.valor)}</td>
        </tr>`;
      });
      h+=`</tbody></table></div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--gray-2)">
        <button class="btn btn-primary" onclick="gerarRemessa()"><i class="ti ti-file-export"></i> Gerar arquivo de remessa (.REM)</button>
      </div>`;
    }
    h+=`</div>`;

    // Histórico de remessas
    if(enviados.length){
      const grupos={};
      enviados.forEach(f=>{const k=f.remessa;if(!grupos[k])grupos[k]=[];grupos[k].push(f);});
      h+=`<div class="card"><div class="card-title"><i class="ti ti-history"></i> Remessas geradas</div>
      <div class="table-wrap"><table><thead><tr><th>Arquivo gerado</th><th>Qtd títulos</th><th>Valor total</th><th>Situação</th></tr></thead><tbody>`;
      Object.keys(grupos).sort((a,b)=>b.localeCompare(a)).forEach(k=>{
        const itens=grupos[k];
        const tot=itens.reduce((s,f)=>s+Number(f.valor||0),0);
        h+=`<tr>
          <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--blue)">${k}</td>
          <td>${itens.length}</td>
          <td style="font-weight:700">${fmtMoney(tot)}</td>
          <td><span class="badge b-nf"><i class="ti ti-check" style="font-size:10px"></i>Enviada</span></td>
        </tr>`;
      });
      h+=`</tbody></table></div></div>`;
    }
  }

  // RETORNO CNAB 240
  if(tabAtual==='retorno'){
    h+=`<div class="page-header"><div class="page-title">Retorno CNAB 240 — SICOOB</div><div class="page-sub">Importe o arquivo .RET do banco para atualizar automaticamente os pagamentos</div></div>`;

    // Upload card
    h+=`<div class="card" style="border-left:4px solid var(--green)">
      <div class="card-title"><i class="ti ti-file-import"></i> Importar arquivo de retorno</div>
      <div style="background:var(--gray-1);border:2px dashed var(--gray-3);border-radius:var(--radius);padding:28px;text-align:center;margin-bottom:14px" id="drop-zone">
        <i class="ti ti-cloud-upload" style="font-size:38px;color:var(--gray-4);display:block;margin-bottom:10px"></i>
        <div style="font-size:14px;font-weight:600;color:var(--gray-5);margin-bottom:6px">Arraste o arquivo .RET aqui</div>
        <div style="font-size:12px;color:var(--gray-4);margin-bottom:14px">ou clique para selecionar</div>
        <label style="display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer">
          <i class="ti ti-upload"></i> Selecionar arquivo .RET
          <input type="file" accept=".ret,.RET,.txt,.TXT,.rem,.REM" style="display:none" onchange="lerArquivoRetorno(this)">
        </label>
      </div>
      <div style="font-size:12px;color:var(--gray-4);padding:10px 12px;background:#F0F7FF;border-radius:var(--radius-sm);border:1px solid #C0D8F5">
        <i class="ti ti-info-circle" style="color:var(--blue)"></i>
        <strong>Como obter o arquivo:</strong> Acesse o internet banking do SICOOB → <strong>Cobrança → Retorno → Baixar arquivo</strong>.
        O arquivo tem extensão <strong>.RET</strong> e segue o layout CNAB 240.
      </div>
    </div>`;

    // Resultado do processamento
    if(window._retornoResultado){
      const res=window._retornoResultado;
      h+=`<div class="card">
        <div class="card-title"><i class="ti ti-report-analytics"></i> Resultado do processamento — <span style="font-size:13px;font-weight:500;color:var(--gray-4)">${res.arquivo}</span></div>

        <div class="stats" style="margin-bottom:16px">
          <div class="stat"><div class="stat-label"><i class="ti ti-file-text"></i> Registros lidos</div><div class="stat-val blue">${res.total}</div></div>
          <div class="stat"><div class="stat-label" style="color:var(--green)"><i class="ti ti-check"></i> Pagos/Liquidados</div><div class="stat-val green">${res.pagos}</div></div>
          <div class="stat"><div class="stat-label"><i class="ti ti-check-circle"></i> Entradas confirmadas</div><div class="stat-val blue">${res.confirmados}</div></div>
          <div class="stat"><div class="stat-label" style="color:var(--red)"><i class="ti ti-x"></i> Rejeitados</div><div class="stat-val amber">${res.rejeitados}</div></div>
          <div class="stat"><div class="stat-label"><i class="ti ti-arrow-down"></i> Baixados</div><div class="stat-val amber">${res.baixados}</div></div>
          <div class="stat"><div class="stat-label"><i class="ti ti-question-mark"></i> Não encontrados</div><div class="stat-val amber">${res.naoEncontrados}</div></div>
        </div>`;

      if(res.itens.length){
        h+=`<div class="table-wrap"><table><thead><tr>
          <th>Ocorrência</th><th>Tomador</th><th>Nosso número</th><th>Vencimento</th><th>Valor</th><th>Data pagamento</th><th>Situação</th>
        </tr></thead><tbody>`;
        res.itens.forEach(it=>{
          const cor=it.tipo==='pago'?'var(--green)':it.tipo==='confirmado'?'var(--blue)':it.tipo==='rejeitado'?'var(--red)':'var(--amber)';
          const icone=it.tipo==='pago'?'ti-check':it.tipo==='confirmado'?'ti-check-circle':it.tipo==='rejeitado'?'ti-alert-circle':'ti-arrow-down';
          h+=`<tr style="${it.tipo==='pago'?'background:#F6FFF0;':''}">
            <td><span class="badge" style="background:${cor}22;color:${cor}"><i class="ti ${icone}" style="font-size:10px"></i>${it.ocorrenciaDesc}</span></td>
            <td style="font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.tomador||it.numDoc}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--blue)">${it.nossoNum}</td>
            <td style="white-space:nowrap">${it.dataVenc}</td>
            <td style="font-weight:700">${it.valorFmt}</td>
            <td style="white-space:nowrap;color:var(--green);font-weight:600">${it.dataPagto||'-'}</td>
            <td style="font-size:12px;max-width:140px">${it.statusMsg}</td>
          </tr>`;
        });
        h+=`</tbody></table></div>`;
      }
      h+=`<div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--gray-2)">
        <button class="btn btn-sec" onclick="window._retornoResultado=null;render()"><i class="ti ti-refresh"></i> Limpar resultado</button>
        <button class="btn btn-green" onclick="confirmarRetorno()"><i class="ti ti-check"></i> Confirmar atualizações no sistema</button>
      </div>`;
      h+=`</div>`;
    }

    // Histórico de retornos processados
    const histRetorno=fretes.filter(f=>f.dataPagamento).length;
    if(histRetorno){
      const pagosRet=fretes.filter(f=>f.dataPagamento);
      h+=`<div class="card"><div class="card-title"><i class="ti ti-history"></i> Pagamentos confirmados via retorno (${pagosRet.length})</div>
      <div class="table-wrap"><table><thead><tr><th>Data pagamento</th><th>Tomador</th><th>Serviço</th><th>Valor</th></tr></thead><tbody>`;
      pagosRet.sort((a,b)=>b.dataPagamento.localeCompare(a.dataPagamento)).slice(0,10).forEach(f=>{
        h+=`<tr><td style="white-space:nowrap;color:var(--green);font-weight:600">${f.dataPagamento}</td><td>${f.tomador||'-'}</td><td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.servico||'-'}</td><td style="font-weight:700">${fmtMoney(f.valor)}</td></tr>`;
      });
      h+=`</tbody></table></div></div>`;
    }
  }

  // BACKUP
  if(tabAtual==='backup'){
    const ultimoSync=fbConfigOk?'<span style="color:var(--green);font-weight:600"><i class="ti ti-cloud-check"></i> Firebase conectado — sincronização automática ativa</span>':'<span style="color:var(--red)"><i class="ti ti-cloud-off"></i> Firebase não conectado</span>';
    h+=`<div class="page-header"><div class="page-title">Backup e proteção de dados</div><div class="page-sub">Mantenha seus dados seguros com backup automático na nuvem e exportação manual</div></div>`;
    
    h+=`<div class="card">
      <div class="card-title"><i class="ti ti-cloud" style="color:var(--blue)"></i> Backup automático (Firebase)</div>
      <div style="padding:16px 0">
        <div style="margin-bottom:12px">${ultimoSync}</div>
        <div style="font-size:13px;color:var(--gray-4);margin-bottom:16px">
          Todos os lançamentos e clientes são salvos automaticamente na nuvem do Google (Firebase). Se trocar de computador ou limpar o cache do navegador, os dados serão restaurados automaticamente ao abrir o sistema.
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="syncFretesFirebase();alerta={tipo:'ok',msg:'Sincronização manual enviada!'};render()"><i class="ti ti-cloud-upload"></i> Sincronizar agora</button>
          <button class="btn btn-sec" onclick="carregarFretesFirebase();alerta={tipo:'ok',msg:'Dados restaurados do Firebase!'};render()"><i class="ti ti-cloud-download"></i> Restaurar do Firebase</button>
        </div>
      </div>
    </div>`;

    h+=`<div class="card">
      <div class="card-title"><i class="ti ti-download" style="color:var(--green)"></i> Backup manual (arquivo JSON)</div>
      <div style="padding:16px 0">
        <div style="font-size:13px;color:var(--gray-4);margin-bottom:16px">
          Exporte um arquivo .json com todos os dados do sistema. Guarde em local seguro (Google Drive, pendrive, etc). Pode importar depois para restaurar.
        </div>
        <div style="background:var(--gray-1);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Total de fretes:</span><strong>${fretes.length}</strong></div>
          <div style="display:flex;justify-content:space-between;font-size:13px"><span>Total de clientes:</span><strong>${clientes.length}</strong></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-green" onclick="exportarBackup()"><i class="ti ti-download"></i> Exportar backup (.json)</button>
          <button class="btn btn-sec" onclick="importarBackup()"><i class="ti ti-upload"></i> Importar backup</button>
        </div>
      </div>
    </div>`;

    h+=`<div class="card">
      <div class="card-title"><i class="ti ti-info-circle" style="color:var(--amber)"></i> Como funciona a proteção</div>
      <div style="padding:16px 0;font-size:13px;color:var(--gray-5);line-height:1.7">
        <strong>1. Automático (Firebase):</strong> Cada vez que você faz um lançamento, aprova um frete ou cadastra um cliente, os dados são enviados automaticamente para a nuvem. Se abrir o sistema em outro computador ou após limpar o cache, os dados são restaurados.<br><br>
        <strong>2. Manual (JSON):</strong> Exporte periodicamente um arquivo de backup e salve em um local seguro. Em caso de emergência, importe o arquivo para restaurar todos os dados.<br><br>
        <strong>Recomendação:</strong> Exporte um backup manual pelo menos 1x por semana e salve no Google Drive.
      </div>
    </div>`;
  }

  // CLIENTES
  if(tabAtual==='clientes'){
    h+=`<div class="page-header"><div class="page-title">Cadastro de clientes</div><div class="page-sub">Clientes salvos aparecem como opção rápida no lançamento</div></div>`;
    h+=`<div class="card">
      <div class="card-title"><i class="ti ti-user-plus"></i> Novo cliente</div>
      <div class="form-grid">
        <div class="field"><label>Nome / Razão social <span style="color:var(--red)">*</span></label><input type="text" id="cli-nome" placeholder="Nome do cliente ou empresa"></div>
        <div class="field"><label>CNPJ / CPF</label><input type="text" id="cli-cnpj" placeholder="00.000.000/0001-00"></div>
        <div class="field"><label>Origem padrão</label><input type="text" id="cli-origem" placeholder="Cidade/local de coleta habitual"></div>
        <div class="field"><label>Destino padrão</label><input type="text" id="cli-destino" placeholder="Cidade/local de entrega habitual"></div>
        <div class="field"><label>Tipo padrão de faturamento</label>
          <select id="cli-tipo">
            <option value="faturado">Faturado (individual)</option>
            <option value="mensal">Mensal</option>
          </select>
        </div>
        <div class="field"><label>Forma de pagamento padrão</label>
          <select id="cli-pgto">
            <option value="">Selecione...</option>
            ${['PIX','Transferência bancária','Dinheiro','Boleto','Cheque'].map(p=>`<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--gray-2)">
        <button class="btn btn-primary" onclick="salvarCliente()"><i class="ti ti-check"></i> Salvar cliente</button>
      </div>
    </div>`;

    if(clientes.length){
      h+=`<div class="card"><div class="card-title"><i class="ti ti-users"></i> Clientes cadastrados</div>
      <div class="table-wrap"><table><thead><tr><th>Nome / Razão social</th><th>CNPJ / CPF</th><th>Origem padrão</th><th>Destino padrão</th><th>Tipo</th><th>Pgto</th><th>Ações</th></tr></thead><tbody>`;
      clientes.forEach((c,i)=>{
        h+=`<tr>
          <td style="font-weight:600">${c.nome}</td>
          <td style="font-size:12px">${c.cnpj||'-'}</td>
          <td style="font-size:12px">${c.origem||'-'}</td>
          <td style="font-size:12px">${c.destino||'-'}</td>
          <td>${c.tipo==='mensal'?`<span class="badge b-men" style="font-size:10px">Mensal</span>`:`<span class="badge b-fat" style="font-size:10px">Faturado</span>`}</td>
          <td style="font-size:12px">${c.pgto||'-'}</td>
          <td><button class="btn btn-danger btn-sm" onclick="excluirCliente(${i})"><i class="ti ti-trash"></i></button></td>
        </tr>`;
      });
      h+=`</tbody></table></div></div>`;
    } else {
      h+=`<div class="card"><div class="empty" style="padding:2rem"><i class="ti ti-users"></i>Nenhum cliente cadastrado ainda.<br><small>Cadastre acima e ele aparecerá como seleção rápida no lançamento.</small></div></div>`;
    }
  }

  // NFS-e
  if(tabAtual==='nfs'){
    h+=`<div class="page-header"><div class="page-title">Emitir NFS-e</div><div class="page-sub">Nota Fiscal de Serviço</div></div>`;
    h+=`<div class="card">`;
    const semNFS=fretes.filter(f=>!f.nfs&&f.status!=='Cancelado');
    if(!semNFS.length)h+=`<div class="empty"><i class="ti ti-file-off"></i>Nenhum frete pendente de NFS-e.</div>`;
    else{
      h+=`<div class="field" style="max-width:520px;margin-bottom:18px"><label>Selecionar frete</label>
      <select onchange="docFrete=this.value?{id:this.value,tipo:'nfs'}:null;render()"><option value="">Selecione um frete...</option>
      ${semNFS.map(f=>`<option value="${f.id}" ${docFrete&&docFrete.id===f.id?'selected':''}>${fmtDate(f.data)} — ${f.tomador||'?'} — ${(f.servico||'').slice(0,40)} — ${fmtMoney(f.valor)}</option>`).join('')}
      </select></div>`;
    }
    if(docFrete&&docFrete.tipo==='nfs'){
      const f=fretes.find(x=>x.id===docFrete.id);
      if(f){
        const num=f.nfs||genNFS();
        const hoje=new Date().toLocaleDateString('pt-BR');
        h+=`<div class="doc">
          <div class="doc-header">
            <div>
              <div class="doc-empresa">${EMPRESA.nome}</div>
              <div class="doc-info">CNPJ: ${EMPRESA.cnpj} · ${EMPRESA.tipo}<br>${EMPRESA.logradouro} — ${EMPRESA.bairro} · ${EMPRESA.cidade}/${EMPRESA.uf} — CEP ${EMPRESA.cep}</div>
            </div>
            <div class="doc-nf-num">
              <div class="doc-nf-label">NFS-e Nº</div>
              <div class="doc-nf-val">${num}</div>
              <div style="font-size:11px;color:#777">Emissão: ${hoje}</div>
            </div>
          </div>
          <div class="doc-bloco">
            <div class="doc-bloco-title"><i class="ti ti-user" style="font-size:10px"></i> Tomador do serviço</div>
            <div class="doc-row"><span>Nome / Razão social</span><span>${f.tomador||'-'}</span></div>
            <div class="doc-row"><span>CNPJ / CPF</span><span>${f.cnpj||'Não informado'}</span></div>
          </div>
          <div class="doc-servico-box">
            <div class="doc-servico-label"><i class="ti ti-star" style="font-size:10px"></i> Serviço prestado</div>
            <div class="doc-servico-val">${f.servico||'Serviço de transporte.'}</div>
          </div>
          ${f.descricao?`<div class="doc-bloco-title" style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px"><i class="ti ti-align-left" style="font-size:10px"></i> Descrição complementar</div><div class="doc-desc-box">${f.descricao}</div>`:''}
          <div class="doc-bloco">
            <div class="doc-bloco-title"><i class="ti ti-map-pin" style="font-size:10px"></i> Dados do transporte</div>
            <div class="doc-row"><span>Origem</span><span>${f.origem||'-'}</span></div>
            <div class="doc-row"><span>Destino</span><span>${f.destino||'-'}</span></div>
            ${f.placa?`<div class="doc-row"><span>Placa</span><span>${f.placa}</span></div>`:''}
            ${f.km?`<div class="doc-row"><span>Distância</span><span>${f.km} km</span></div>`:''}
            ${f.cte?`<div class="doc-row"><span>CTe / OS</span><span>${f.cte}</span></div>`:''}
          </div>
          <div class="doc-bloco">
            <div class="doc-bloco-title"><i class="ti ti-currency-dollar" style="font-size:10px"></i> Financeiro</div>
            <div class="doc-row"><span>Forma de pagamento</span><span>${f.pagamento||'Não informado'}</span></div>
            <div class="doc-row"><span>ISS</span><span>MEI — isento de retenção</span></div>
          </div>
          <div class="doc-total">Valor total do serviço: ${fmtMoney(f.valor)}</div>
          <div class="doc-footer">Prestador: ${EMPRESA.nome} · CNPJ: ${EMPRESA.cnpj} · ${EMPRESA.endFull}<br>Documento gerado pelo sistema de gestão de fretes — Ambiente de homologação</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
          <button class="btn btn-sec" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir</button>
          <button class="btn btn-primary" onclick="emitirNFS('${f.id}','${num}')"><i class="ti ti-file-invoice"></i> Confirmar emissão</button>
        </div>`;
      }
    }
    h+=`</div>`;
  }

  // BOLETO
  if(tabAtual==='boleto'){
    h+=`<div class="page-header"><div class="page-title">Emitir boleto</div></div>`;
    h+=`<div class="card">`;
    const semBol=fretes.filter(f=>!f.boleto&&f.status!=='Cancelado');
    if(!semBol.length)h+=`<div class="empty"><i class="ti ti-file-off"></i>Nenhum frete pendente de boleto.</div>`;
    else{
      h+=`<div class="field" style="max-width:520px;margin-bottom:18px"><label>Selecionar frete</label>
      <select onchange="docFrete=this.value?{id:this.value,tipo:'boleto'}:null;render()"><option value="">Selecione...</option>
      ${semBol.map(f=>`<option value="${f.id}" ${docFrete&&docFrete.id===f.id?'selected':''}>${fmtDate(f.data)} — ${f.tomador||'?'} — ${fmtMoney(f.valor)}</option>`).join('')}
      </select></div>`;
    }
    if(docFrete&&docFrete.tipo==='boleto'){
      const f=fretes.find(x=>x.id===docFrete.id);
      if(f){
        const cod=f.boleto||genBoleto();
        const vencStr=f.vencimento?(()=>{const[y,m,d]=f.vencimento.split('-');return`${d}/${m}/${y}`;})():(()=>{const vd=new Date();vd.setDate(vd.getDate()+30);return vd.toLocaleDateString('pt-BR');})();
        const bars=Array(55).fill('').map(()=>`<div style="width:${Math.random()>.4?2:1}px;height:${26+Math.floor(Math.random()*16)}px;background:#fff;margin:0 .5px;opacity:${.6+Math.random()*.4}"></div>`).join('');
        h+=`<div class="doc">
          <div class="doc-header">
            <div>
              <div class="doc-empresa">${EMPRESA.nome}</div>
              <div class="doc-info">CNPJ: ${EMPRESA.cnpj} · ${EMPRESA.tipo}<br>${EMPRESA.endFull}</div>
            </div>
            <div class="doc-nf-num">
              <div class="doc-nf-label">Vencimento</div>
              <div style="font-size:17px;font-weight:800;color:var(--blue)">${vencStr}</div>
              <div style="font-size:21px;font-weight:800;color:var(--blue)">${fmtMoney(f.valor)}</div>
            </div>
          </div>
          <div class="doc-bloco">
            <div class="doc-bloco-title">Pagador</div>
            <div class="doc-row"><span>Nome / Razão social</span><span>${f.tomador||'-'}</span></div>
            <div class="doc-row"><span>CNPJ / CPF</span><span>${f.cnpj||'Não informado'}</span></div>
          </div>
          <div class="doc-bloco">
            <div class="doc-bloco-title">Referência</div>
            <div class="doc-row"><span>Serviço prestado</span><span>${f.servico||'-'}</span></div>
            <div class="doc-row"><span>Rota</span><span>${f.origem||'-'} → ${f.destino||'-'}</span></div>
            <div class="doc-row"><span>Data do serviço</span><span>${fmtDate(f.data)}</span></div>
            ${f.cte?`<div class="doc-row"><span>CTe / OS</span><span>${f.cte}</span></div>`:''}
          </div>
          <div class="boleto-bar">${bars}</div>
          <div class="boleto-linha">${cod}</div>
          <div class="doc-footer">Beneficiário: ${EMPRESA.nome} · CNPJ: ${EMPRESA.cnpj} · ${EMPRESA.endFull}<br>Após vencimento: multa 2% + juros 1%/mês · Documento simulado — Ambiente de homologação</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
          <button class="btn btn-sec" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir</button>
          <button class="btn btn-primary" onclick="emitirBoleto('${f.id}','${cod}')"><i class="ti ti-receipt"></i> Confirmar emissão</button>
        </div>`;
      }
    }
    h+=`</div>`;
  }

  main.innerHTML=h;
  if(tabAtual==='novo')renderForm();
}

function limpar(){form={tipo:'faturado'};renderForm();}
function togglePasta(k){pastaAberta=pastaAberta===k?null:k;render();}
function gerarRel(k){relGerado={chave:k,itens:fretes.filter(f=>getMesAno(f.data)===k&&f.status!=='Cancelado')};tabAtual='relatorio';relMes=k.split('-')[1];relAno=k.split('-')[0];document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));const nb=document.getElementById('nb-relatorio');if(nb)nb.classList.add('active');render();}

function salvar(){
  const f=form;
  if(!f.data||!f.vencimento||!f.tomador||!f.origem||!f.destino||!f.valor||!f.servico){alerta={tipo:'err',msg:'Preencha: Data, Vencimento, Tomador, Origem, Destino, Serviço prestado e Valor.'};render();return;}
  const novo={...f,id:genId(),status:'Pendente',criadoEm:Date.now()};
  fretes.push(novo);save();form={tipo:'faturado'};
  alerta={tipo:'ok',msg:`Lançamento salvo!${novo.tipo==='mensal'?' Adicionado na pasta '+getMesNome(getMesAno(novo.data))+'.':''}`};
  nav('fretes');
}
function emitirNFS(id,num){const f=fretes.find(x=>x.id===id);if(!f)return;f.nfs=num;f.status='NFS-e emitida';save();alerta={tipo:'ok',msg:`NFS-e nº ${num} emitida para ${f.tomador}!`};docFrete=null;nav('fretes');}

function cnabStr(v,n,dir='R',pad=' '){
  v=String(v??'').toUpperCase().replace(/[^\x20-\x7E]/g,' ');
  if(dir==='L') return v.slice(0,n).padStart(n,pad);
  return v.slice(0,n).padEnd(n,pad);
}
function cnabNum(v,n){ return String(Math.round(Number(v)||0)).padStart(n,'0').slice(-n); }
function cnabData(d){
  if(!d)return'00000000';
  const[y,m,day]=d.split('-');
  return `${day}${m}${y}`;
}
function cnabValidar(linha,pos){
  if(linha.length!==240){
    console.warn(`Linha ${pos}: ${linha.length} chars (esperado 240). Ajustando.`);
    return linha.length<240?linha.padEnd(240,' '):linha.slice(0,240);
  }
  return linha;
}

function calcDVMod11(num){
  // Módulo 11 para DV nosso número SICOOB
  const n=String(num).split('').reverse();
  let soma=0,peso=2;
  for(let i=0;i<n.length;i++){soma+=parseInt(n[i])*peso;peso=peso===9?2:peso+1;}
  const resto=soma%11;
  if(resto===0||resto===1)return'0';
  return String(11-resto);
}

  '02':'Entrada confirmada',
  '03':'Entrada rejeitada',

function cnabDataFmt(s){
  // DDMMAAAA → DD/MM/AAAA
  if(!s||s==='00000000')return'-';
  return`${s.slice(0,2)}/${s.slice(2,4)}/${s.slice(4,8)}`;
}
