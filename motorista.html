<style>
:root{
  --blue:#1A5FA8;--blue-dark:#0D3F75;--blue-light:#E8F0FB;
  --green:#276C14;--green-light:#EAF3E0;
  --amber:#8A4A00;--amber-light:#FEF0DA;
  --red:#8B1A1A;--red-light:#FCEAEA;
  --gray-1:#F7F8FA;--gray-2:#ECEEF2;--gray-3:#D1D5DF;
  --gray-4:#8A90A0;--gray-5:#3D4250;--gray-6:#1A1D26;
  --radius:14px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#F0F4FA;color:var(--gray-6);min-height:100vh;padding-bottom:40px}

.header{background:var(--blue);color:#fff;padding:20px 20px 28px;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:#F0F4FA;border-radius:50% 50% 0 0/40px 40px 0 0}
.header-logo{font-size:13px;opacity:.8;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.header-title{font-size:22px;font-weight:700}
.header-sub{font-size:13px;opacity:.75;margin-top:2px}

.body{padding:24px 16px 0}

/* Motorista selector */
.motorista-card{background:#fff;border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.motorista-label{font-size:11px;font-weight:700;color:var(--gray-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.motorista-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mot-btn{padding:12px 8px;border-radius:var(--radius-sm);border:2px solid var(--gray-2);background:#fff;font-size:14px;font-weight:600;color:var(--gray-5);cursor:pointer;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.mot-btn i{font-size:22px;color:var(--gray-4)}
.mot-btn.sel{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.mot-btn.sel i{color:var(--blue)}

/* Form */
.form-card{background:#fff;border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.form-title{font-size:14px;font-weight:700;color:var(--gray-6);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.form-title i{color:var(--blue);font-size:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-5);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--gray-3);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;color:var(--gray-6);background:#fff;-webkit-appearance:none;transition:.12s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,.12)}
.field textarea{resize:none;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Tipo toggle */
.tipo-row{display:flex;gap:8px;margin-bottom:14px}
.tipo-opt{flex:1;padding:12px 6px;border-radius:var(--radius-sm);border:2px solid var(--gray-2);background:#fff;font-size:13px;font-weight:600;color:var(--gray-4);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s}
.tipo-opt i{font-size:20px}
.tipo-opt.fat.sel{border-color:var(--green);background:var(--green-light);color:var(--green)}
.tipo-opt.men.sel{border-color:#5A1D9A;background:#EEE6FB;color:#5A1D9A}

/* Submit */
.btn-submit{width:100%;padding:18px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:17px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;margin-top:4px}
.btn-submit:active{background:var(--blue-dark);transform:scale(.98)}
.btn-submit:disabled{background:var(--gray-3);cursor:not-allowed}

/* Success */
.success-card{background:#fff;border-radius:var(--radius);padding:28px 20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);display:none}
.success-icon{width:70px;height:70px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;color:var(--green)}
.success-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:6px}
.success-sub{font-size:14px;color:var(--gray-4);margin-bottom:20px}
.btn-novo{width:100%;padding:15px;background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer}

/* Histórico */
.hist-card{background:#fff;border-radius:var(--radius);padding:18px;margin-top:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hist-title{font-size:13px;font-weight:700;color:var(--gray-4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.hist-item{padding:12px 0;border-bottom:1px solid var(--gray-2);display:flex;justify-content:space-between;align-items:flex-start}
.hist-item:last-child{border-bottom:none;padding-bottom:0}
.hist-left{flex:1}
.hist-servico{font-size:13px;font-weight:600;color:var(--gray-6);margin-bottom:2px}
.hist-meta{font-size:11px;color:var(--gray-4)}
.hist-right{text-align:right}
.hist-valor{font-size:14px;font-weight:700;color:var(--blue)}
.hist-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px;display:inline-block}
.st-pend{background:var(--amber-light);color:var(--amber)}
.st-aprov{background:var(--green-light);color:var(--green)}
.st-rej{background:var(--red-light);color:var(--red)}

/* Alert */
.alert{padding:14px 16px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:500}
.alert-err{background:var(--red-light);color:var(--red);border:1.5px solid #F5C0C0}

/* Offline banner */
.offline-banner{background:#FEF0DA;color:var(--amber);font-size:12px;font-weight:600;text-align:center;padding:8px;display:none}
.offline-banner.show{display:block}

/* Config needed */
.config-needed{background:#fff;border-radius:var(--radius);padding:24px;margin:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.config-needed i{font-size:48px;color:var(--amber);display:block;margin-bottom:12px}
</style>
</head>

<script>
// ══════════════════════════════════════════════════
// CONFIGURAÇÃO FIREBASE — preencha com seus dados
// ══════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBRcsXHRXG2HgUjl87xkpLzGT6GcrbN8v8",
  authDomain: "fretes-marco.firebaseapp.com",
  projectId: "fretes-marco",
  storageBucket: "fretes-marco.firebasestorage.app",
  messagingSenderId: "998234786464",
  appId: "1:998234786464:web:007d3b1d00ae0626acd7c5"
};
// ══════════════════════════════════════════════════

const MOTORISTAS = [
  'Motorista 1',
  'Motorista 2',
  'Motorista 3',
  'Motorista 4',
  'Motorista 5'
];
// Edite os nomes acima com os nomes reais dos seus motoristas

const ICONES = ['ti-user','ti-user','ti-user','ti-user','ti-user'];

let db = null;
let motSelecionado = localStorage.getItem('mot_nome') || '';
let tipo = localStorage.getItem('mot_tipo') || 'faturado';
let form = {};
let enviando = false;
let configOk = false;

function iniciarFirebase(){
  try {
    if(FIREBASE_CONFIG.apiKey === 'COLE_AQUI_SUA_API_KEY') {
      configOk = false;
      return;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    configOk = true;
  } catch(e) {
    console.error('Firebase erro:', e);
    configOk = false;
  }
}

function fmtMoney(v){
  return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function render(){
  const body = document.getElementById('app-body');

  if(!configOk){
    body.innerHTML = `<div class="config-needed">
      <i class="ti ti-settings"></i>
      <div style="font-size:18px;font-weight:700;color:var(--amber);margin-bottom:8px">Configuração necessária</div>
      <div style="font-size:14px;color:var(--gray-4);line-height:1.6">
        Adicione as credenciais do Firebase no arquivo <strong>motorista.html</strong>.<br>
        Veja o README.md para instruções completas.
      </div>
    </div>`;
    return;
  }

  let html = '';

  // Seleção de motorista
  html += `<div class="motorista-card">
    <div class="motorista-label"><i class="ti ti-steering-wheel" style="font-size:12px"></i> Quem está registrando?</div>
    <div class="motorista-grid">`;
  MOTORISTAS.forEach((m,i) => {
    html += `<button class="mot-btn ${motSelecionado===m?'sel':''}" onclick="selecionarMot('${m}')">
      <i class="ti ti-user-circle" style="font-size:28px"></i>
      <span>${m}</span>
    </button>`;
  });
  html += `</div></div>`;

  if(!motSelecionado){
    html += `<div style="text-align:center;padding:20px;color:var(--gray-4);font-size:14px">
      <i class="ti ti-arrow-up" style="display:block;font-size:24px;margin-bottom:6px"></i>
      Selecione seu nome para continuar
    </div>`;
    body.innerHTML = html;
    return;
  }

  // Formulário
  html += `
  <div id="alert-area"></div>

  <div class="form-card">
    <div class="form-title"><i class="ti ti-truck"></i> Dados do frete</div>

    <div class="field">
      <label>Data e hora do serviço</label>
      <input type="datetime-local" id="f-datetime" value="${form.datetime||hojeLocal()}" onchange="sf('datetime',this.value)">
    </div>

    <div class="field">
      <label>Serviço / Descrição <span style="color:var(--red)">*</span></label>
      <textarea id="f-servico" rows="3" placeholder="Ex.: Transporte de GLP P45 — coleta em Itaúna, entrega em Divinópolis" onchange="sf('servico',this.value)">${form.servico||''}</textarea>
    </div>

  </div>

  <div class="form-card">
    <div class="form-title"><i class="ti ti-building"></i> Remetente e Destinatário</div>

    <div class="field">
      <label>Remetente (quem paga o frete) <span style="color:var(--red)">*</span></label>
      <div style="position:relative">
        <input type="text" id="f-remetente" placeholder="Digite o nome ou CNPJ para buscar..." value="${form.remetente||''}" oninput="buscarCliente(this.value,'rem')" onfocus="buscarCliente(this.value,'rem')" autocomplete="off" style="font-weight:600;padding-right:40px">
        <button onclick="abrirCadastro('rem')" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--blue);color:#fff;border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px" title="Cadastrar novo cliente"><i class="ti ti-plus"></i></button>
      </div>
      <div id="sugestoes-rem" style="display:none;position:absolute;left:0;right:0;background:#fff;border:1.5px solid var(--blue);border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15)"></div>
      ${form.remCnpj?`<div style="font-size:12px;color:var(--blue);margin-top:3px;font-weight:500"><i class="ti ti-id" style="font-size:11px"></i> CNPJ: ${form.remCnpj}</div>`:''}
    </div>

    <div class="field">
      <label>Destinatário (quem recebe) <span style="color:var(--red)">*</span></label>
      <div style="position:relative">
        <input type="text" id="f-destinatario" placeholder="Digite o nome ou CNPJ para buscar..." value="${form.destinatario||''}" oninput="buscarCliente(this.value,'dest')" onfocus="buscarCliente(this.value,'dest')" autocomplete="off" style="font-weight:600;padding-right:40px">
        <button onclick="abrirCadastro('dest')" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--blue);color:#fff;border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px" title="Cadastrar novo cliente"><i class="ti ti-plus"></i></button>
      </div>
      <div id="sugestoes-dest" style="display:none;position:absolute;left:0;right:0;background:#fff;border:1.5px solid var(--blue);border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15)"></div>
      ${form.destCnpj?`<div style="font-size:12px;color:var(--blue);margin-top:3px;font-weight:500"><i class="ti ti-id" style="font-size:11px"></i> CNPJ: ${form.destCnpj}</div>`:''}
    </div>

    <div class="field-row">
      <div class="field" style="margin-bottom:0">
        <label>Origem <span style="color:var(--red)">*</span></label>
        <input type="text" id="f-origem" placeholder="Cidade de coleta" value="${form.origem||''}" oninput="sf('origem',this.value)">
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Destino <span style="color:var(--red)">*</span></label>
        <input type="text" id="f-destino" placeholder="Cidade de entrega" value="${form.destino||''}" oninput="sf('destino',this.value)">
      </div>
    </div>
  </div>

  <!-- Modal Cadastro Cliente por CNPJ -->
  <div id="modal-cadastro" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;padding:20px;overflow-y:auto">
    <div style="background:#fff;border-radius:14px;max-width:440px;margin:30px auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:16px;font-weight:700;color:var(--gray-6)"><i class="ti ti-user-plus" style="color:var(--blue)"></i> Novo cliente</div>
        <button onclick="fecharCadastro()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-4)"><i class="ti ti-x"></i></button>
      </div>
      <div class="field">
        <label>CNPJ <span style="color:var(--blue);font-size:11px">— busca automática na Receita Federal</span></label>
        <div style="display:flex;gap:8px">
          <input type="text" id="cad-cnpj" placeholder="00.000.000/0001-00" oninput="this.value=mascaraCnpj(this.value)" maxlength="18" style="flex:1;font-size:16px;letter-spacing:1px">
          <button onclick="buscarCNPJ()" style="background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap"><i class="ti ti-search"></i> Buscar</button>
        </div>
      </div>
      <div id="cad-loading" style="display:none;text-align:center;padding:16px;color:var(--blue)"><i class="ti ti-loader-2" style="animation:spin 1s linear infinite;font-size:24px"></i><br>Consultando Receita Federal...</div>
      <div id="cad-result" style="display:none">
        <div style="background:var(--green-light);border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #B8DDA8">
          <div style="font-size:11px;color:var(--green);font-weight:600;text-transform:uppercase;margin-bottom:4px"><i class="ti ti-check"></i> Dados encontrados</div>
          <div id="cad-nome-display" style="font-size:16px;font-weight:700;color:var(--gray-6)"></div>
          <div id="cad-info-display" style="font-size:12px;color:var(--gray-4);margin-top:4px"></div>
        </div>
        <div class="field">
          <label>Razão Social</label>
          <input type="text" id="cad-nome" readonly style="background:var(--gray-1)">
        </div>
        <div class="field">
          <label>Nome Fantasia</label>
          <input type="text" id="cad-fantasia" readonly style="background:var(--gray-1)">
        </div>
        <div class="field">
          <label>Cidade / UF</label>
          <input type="text" id="cad-cidade" readonly style="background:var(--gray-1)">
        </div>
        <div class="field">
          <label>Tipo padrão de faturamento</label>
          <select id="cad-tipo"><option value="faturado">Faturado</option><option value="mensal">Mensal</option></select>
        </div>
        <button onclick="confirmarCadastro()" style="width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif"><i class="ti ti-check"></i> Cadastrar cliente</button>
      </div>
      <div id="cad-erro" style="display:none;background:var(--red-light);color:var(--red);border-radius:10px;padding:12px;margin-top:8px;font-size:13px;text-align:center"></div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-title"><i class="ti ti-currency-dollar"></i> Financeiro</div>

    <div class="field">
      <label>Valor do frete (R$) <span style="color:var(--red)">*</span></label>
      <input type="number" id="f-valor" placeholder="0,00" value="${form.valor||''}" inputmode="decimal" oninput="sf('valor',this.value)" style="font-size:20px;font-weight:700">
    </div>

    <div class="field">
      <label>Tipo de faturamento <span style="color:var(--red)">*</span></label>
      <div class="tipo-row">
        <button class="tipo-opt fat ${tipo==='faturado'?'sel':''}" onclick="setTipo('faturado')">
          <i class="ti ti-file-dollar"></i>
          Faturado
        </button>
        <button class="tipo-opt men ${tipo==='mensal'?'sel':''}" onclick="setTipo('mensal')">
          <i class="ti ti-calendar-month"></i>

    </div>

    ${tipo==='faturado'?`<div class="field">
      <label>Forma de pagamento <span style="color:var(--red)">*</span></label>
      <div class="tipo-row">
        <button class="tipo-opt ${form.formaPgto==='avista'?'sel':''}" onclick="sf('formaPgto','avista');render()" style="flex:1;${form.formaPgto==='avista'?'border-color:var(--green);background:var(--green-light);color:var(--green)':''}">
          <i class="ti ti-cash"></i>
          À vista
        </button>
        <button class="tipo-opt ${form.formaPgto==='pix'?'sel':''}" onclick="sf('formaPgto','pix');render()" style="flex:1;${form.formaPgto==='pix'?'border-color:var(--green);background:var(--green-light);color:var(--green)':''}">
          <i class="ti ti-qrcode"></i>
          PIX
        </button>
        <button class="tipo-opt ${form.formaPgto==='boleto'?'sel':''}" onclick="sf('formaPgto','boleto');render()" style="flex:1;${form.formaPgto==='boleto'?'border-color:var(--green);background:var(--green-light);color:var(--green)':''}">
          <i class="ti ti-receipt"></i>
          Boleto
        </button>
      </div>
    </div>`:''}

    <div class="field">
      <label>Precisa emitir Nota Fiscal?</label>
      <div class="tipo-row">
        <button class="tipo-opt ${form.emitirNF==='sim'?'sel':''}" onclick="sf('emitirNF','sim');render()" style="flex:1;${form.emitirNF==='sim'?'border-color:var(--blue);background:var(--blue-light);color:var(--blue)':''}">
          <i class="ti ti-file-invoice"></i>
          Sim
        </button>
        <button class="tipo-opt ${form.emitirNF==='nao'?'sel':''}" onclick="sf('emitirNF','nao');render()" style="flex:1;${form.emitirNF==='nao'?'border-color:var(--gray-4);background:var(--gray-1);color:var(--gray-5)':''}">
          <i class="ti ti-file-off"></i>
          Não
        </button>
      </div>
    </div>

    <div class="field">
      <label>Prazo de vencimento <span style="color:var(--red)">*</span></label>
      <div class="tipo-row">
        ${[5,7,10,15,20].map(d=>`<button class="tipo-opt ${(form.prazoVenc==d)?'sel':''}" onclick="setPrazo(${d})" style="flex:1;${(form.prazoVenc==d)?'border-color:var(--blue);background:var(--blue-light);color:var(--blue)':''}">
          <i class="ti ti-calendar-event"></i>
          ${d} dias
        </button>`).join('')}
      </div>
      ${form.prazoVenc?`<div style="font-size:13px;color:var(--blue);font-weight:600;margin-top:4px;text-align:center"><i class="ti ti-calendar-check" style="font-size:13px"></i> Vencimento: ${calcVencMot(form.datetime||hojeLocal(),form.prazoVenc)}</div>`:''}
    </div>

    <div class="field">
      <label>Observações</label>
      <textarea id="f-obs" rows="2" placeholder="Informações adicionais..." onchange="sf('obs',this.value)">${form.obs||''}</textarea>
    </div>
  </div>

  <button class="btn-submit" onclick="enviarFrete()" ${enviando?'disabled':''}>
    ${enviando
      ? '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Enviando...'
      : '<i class="ti ti-send"></i> Enviar registro de frete'}
  </button>`;

  // Histórico do motorista
  html += `<div class="hist-card" id="hist-container">
    <div class="hist-title"><i class="ti ti-history" style="font-size:12px"></i> Seus últimos fretes</div>
    <div id="hist-list" style="color:var(--gray-4);font-size:13px;text-align:center;padding:12px">Carregando...</div>
  </div>`;

  body.innerHTML = html;

  // Carrega histórico
  carregarHistorico();
}

function hojeLocal(){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

function sf(k,v){ form[k]=v; }
function setTipo(t){ tipo=t; localStorage.setItem('mot_tipo',t); render(); }
function selecionarMot(nome){ motSelecionado=nome; localStorage.setItem('mot_nome',nome); form={}; render(); }

function setPrazo(dias){
  form.prazoVenc=dias;
  // Calcula data de vencimento
  const dt=form.datetime||hojeLocal();
  const base=new Date(dt.slice(0,10)+'T00:00:00');
  base.setDate(base.getDate()+dias);
  const pad=n=>String(n).padStart(2,'0');
  form.vencimento=`${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(base.getDate())}`;
  render();
}

function calcVencMot(dt,dias){
  if(!dt||!dias) return '-';
  const base=new Date(dt.slice(0,10)+'T00:00:00');
  base.setDate(base.getDate()+dias);
  return base.toLocaleDateString('pt-BR');
}

function mostrarSucesso(dados){
  const body = document.getElementById('app-body');
  body.innerHTML = `
    <div class="success-card" style="display:block">
      <div class="success-icon"><i class="ti ti-check"></i></div>
      <div class="success-title">Frete registrado!</div>
      <div class="success-sub">
        <strong>${dados.servico||'Frete'}</strong><br>
        <span style="font-size:13px"><strong>De:</strong> ${dados.remetente||'-'} → <strong>Para:</strong> ${dados.destinatario||'-'}</span><br>
        ${dados.origem||''} → ${dados.destino||''}<br>
        Valor: <strong>${fmtMoney(dados.valor)}</strong> · ${dados.tipo==='mensal'?'Mensal':'Faturado'+(dados.formaPgto?' — '+({'avista':'À vista','pix':'PIX','boleto':'Boleto'}[dados.formaPgto]||''):'')}<br>
        ${dados.emitirNF==='sim'?'<span style="color:var(--blue)"><i class="ti ti-file-invoice"></i> NF solicitada</span><br>':''}
        <span style="color:var(--gray-4);font-size:12px">O registro foi enviado e já aparece no sistema da Expresso Ricci.</span>
      </div>
      <button class="btn-novo" onclick="form={};render()">

function mostrarAlerta(msg){
  const el = document.getElementById('alert-area');
  if(el) el.innerHTML = `<div class="alert alert-err"><i class="ti ti-alert-circle"></i>${msg}</div>`;
  window.scrollTo({top:0,behavior:'smooth'});

// ── CLIENTES (Firebase) ─────────────────────────────────────────
let clientesFB = [];
let cadastroTarget = 'rem'; // 'rem' or 'dest'
let cadDados = {};

function carregarClientes(){
  if(!db)return;
  db.collection('clientes_expresso').onSnapshot(snap=>{
    clientesFB=[];
    snap.forEach(doc=>{ clientesFB.push({_id:doc.id,...doc.data()}); });
    clientesFB.sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  },err=>console.log('Clientes err:',err));
}

function buscarCliente(txt,tipo){
  const el=document.getElementById('sugestoes-'+tipo);
  if(!el)return;
  const q=(txt||'').toLowerCase().replace(/[.\-\/]/g,'');
  if(q.length<2){el.style.display='none';return;}
  const res=clientesFB.filter(c=>{
    const nome=(c.nome||'').toLowerCase();
    const cnpj=(c.cnpj||'').replace(/\D/g,'');
    const fantasia=(c.fantasia||'').toLowerCase();
    return nome.includes(q)||cnpj.includes(q)||fantasia.includes(q);
  }).slice(0,6);
  if(!res.length){el.style.display='none';return;}
  let h='';
  res.forEach(c=>{
    h+=`<div onclick="selecionarCliente('${c._id}','${tipo}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #eee;font-size:13px;transition:.1s" onmouseover="this.style.background='#E8F0FB'" onmouseout="this.style.background='#fff'">
      <div style="font-weight:600;color:#1A1D26">${c.nome||'-'}</div>
      ${c.cnpj?`<div style="font-size:11px;color:#8A90A0">${c.cnpj}</div>`:''}
      ${c.origem||c.destino?`<div style="font-size:11px;color:#8A90A0">${c.origem||''} ${c.destino?'→ '+c.destino:''}</div>`:''}
    </div>`;
  });
  el.innerHTML=h;
  el.style.display='block';
}

function selecionarCliente(id,tipo){
  const c=clientesFB.find(x=>x._id===id);
  if(!c)return;
  if(tipo==='rem'){
    form.remetente=c.nome||'';
    form.remCnpj=c.cnpj||'';
    if(c.origem)form.origem=c.origem;
    if(c.tipo)tipo=c.tipo;
  } else {
    form.destinatario=c.nome||'';
    form.destCnpj=c.cnpj||'';
    if(c.destino)form.destino=c.destino;
  }
  document.getElementById('sugestoes-'+tipo).style.display='none';
  render();
}

function mascaraCnpj(v){
  v=v.replace(/\D/g,'');
  if(v.length>14)v=v.slice(0,14);
  if(v.length>12)return v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{1,2})/,'$1.$2.$3/$4-$5');
  if(v.length>8)return v.replace(/^(\d{2})(\d{3})(\d{3})(\d{1,4})/,'$1.$2.$3/$4');
  if(v.length>5)return v.replace(/^(\d{2})(\d{3})(\d{1,3})/,'$1.$2.$3');
  if(v.length>2)return v.replace(/^(\d{2})(\d{1,3})/,'$1.$2');
  return v;
}

function abrirCadastro(tipo){
  cadastroTarget=tipo;
  cadDados={};
  document.getElementById('modal-cadastro').style.display='block';
  document.getElementById('cad-cnpj').value='';
  document.getElementById('cad-result').style.display='none';
  document.getElementById('cad-erro').style.display='none';
  document.getElementById('cad-loading').style.display='none';
  setTimeout(()=>document.getElementById('cad-cnpj').focus(),200);
}

function fecharCadastro(){
  document.getElementById('modal-cadastro').style.display='none';
}

async function buscarCNPJ(){
  const cnpjRaw=document.getElementById('cad-cnpj').value.replace(/\D/g,'');
  if(cnpjRaw.length!==14){
    document.getElementById('cad-erro').textContent='CNPJ deve ter 14 dígitos.';
    document.getElementById('cad-erro').style.display='block';
    return;
  }
  document.getElementById('cad-loading').style.display='block';
  document.getElementById('cad-result').style.display='none';
  document.getElementById('cad-erro').style.display='none';

  try{
    // BrasilAPI (gratuita, sem limite)
    let resp=await fetch('https://brasilapi.com.br/api/cnpj/v1/'+cnpjRaw);
    if(!resp.ok) throw new Error('BrasilAPI falhou');
    const d=await resp.json();
    cadDados={
      cnpj:mascaraCnpj(cnpjRaw),
      nome:d.razao_social||'',
      fantasia:d.nome_fantasia||'',
      cidade:(d.municipio||'')+' / '+(d.uf||''),
      logradouro:d.logradouro||'',
      bairro:d.bairro||'',
      cep:d.cep||'',
      uf:d.uf||''
    };
    mostrarResultCad();
  }catch(e){
    try{
      // Fallback: ReceitaWS
      let resp=await fetch('https://receitaws.com.br/v1/cnpj/'+cnpjRaw);
      if(!resp.ok)throw new Error('ReceitaWS falhou');
      const d=await resp.json();
      if(d.status==='ERROR'){throw new Error(d.message||'CNPJ não encontrado');}
      cadDados={
        cnpj:mascaraCnpj(cnpjRaw),
        nome:d.nome||'',
        fantasia:d.fantasia||'',
        cidade:(d.municipio||'')+' / '+(d.uf||''),
        logradouro:d.logradouro||'',
        bairro:d.bairro||'',
        cep:d.cep||'',
        uf:d.uf||''
      };
      mostrarResultCad();
    }catch(e2){
      document.getElementById('cad-loading').style.display='none';
      document.getElementById('cad-erro').textContent='CNPJ não encontrado. Verifique o número e tente novamente.';
      document.getElementById('cad-erro').style.display='block';
    }
  }
}

function mostrarResultCad(){
  document.getElementById('cad-loading').style.display='none';
  document.getElementById('cad-result').style.display='block';
  document.getElementById('cad-nome').value=cadDados.nome;
  document.getElementById('cad-fantasia').value=cadDados.fantasia||'-';
  document.getElementById('cad-cidade').value=cadDados.cidade;
  document.getElementById('cad-nome-display').textContent=cadDados.fantasia||cadDados.nome;
  document.getElementById('cad-info-display').textContent=cadDados.cnpj+' — '+cadDados.cidade;
}

async function confirmarCadastro(){
  if(!cadDados.nome){return;}
  const tipoCad=document.getElementById('cad-tipo').value;
  const novoCliente={
    nome:cadDados.nome,
    fantasia:cadDados.fantasia||'',
    cnpj:cadDados.cnpj,
    origem:cadDados.cidade?cadDados.cidade.split('/')[0].trim():'',
    destino:'',
    tipo:tipoCad,
    pgto:'',
    logradouro:cadDados.logradouro||'',
    bairro:cadDados.bairro||'',
    cidade:cadDados.cidade||'',
    uf:cadDados.uf||'',
    cep:cadDados.cep||'',
    atualizadoEm:new Date().toISOString()
  };
  // Salvar no Firebase
  try{
    const id=cadDados.cnpj.replace(/\D/g,'');
    await db.collection('clientes_expresso').doc(id).set(novoCliente,{merge:true});
    // Preencher no formulário
    const nomeUsar=cadDados.fantasia||cadDados.nome;
    if(cadastroTarget==='rem'){
      form.remetente=nomeUsar;
      form.remCnpj=cadDados.cnpj;
    } else {
      form.destinatario=nomeUsar;
      form.destCnpj=cadDados.cnpj;
    }
    fecharCadastro();
    render();
    mostrarAlerta(''); // limpa alertas
    // Mini alerta de sucesso
    const body=document.getElementById('app-body');
    const alertDiv=document.createElement('div');
    alertDiv.className='alert';
    alertDiv.style.cssText='background:#EAF3E0;color:#276C14;border:1.5px solid #B8DDA8';
    alertDiv.innerHTML=`<i class="ti ti-check"></i> ${nomeUsar} cadastrado com sucesso!`;
    body.insertBefore(alertDiv,body.firstChild);
    setTimeout(()=>alertDiv.remove(),3000);
  }catch(e){
    document.getElementById('cad-erro').textContent='Erro ao salvar: '+e.message;
    document.getElementById('cad-erro').style.display='block';
  }
}

// Fechar sugestões ao clicar fora
document.addEventListener('click',e=>{
  if(!e.target.closest('#f-remetente')&&!e.target.closest('#sugestoes-rem')){
    const el=document.getElementById('sugestoes-rem');if(el)el.style.display='none';
  }
  if(!e.target.closest('#f-destinatario')&&!e.target.closest('#sugestoes-dest')){
    const el=document.getElementById('sugestoes-dest');if(el)el.style.display='none';
  }
});

async function enviarFrete(){
  if(enviando) return;
  const f = form;

  if(!motSelecionado){ mostrarAlerta('Selecione seu nome.'); return; }
  if(!f.servico){ mostrarAlerta('Preencha a descrição do serviço.'); return; }
  if(!f.remetente){ mostrarAlerta('Preencha o remetente (empresa que contrata).'); return; }
  if(!f.destinatario){ mostrarAlerta('Preencha o destinatário (quem recebe).'); return; }
  if(!f.origem){ mostrarAlerta('Preencha a origem.'); return; }
  if(!f.destino){ mostrarAlerta('Preencha o destino.'); return; }
  if(!f.valor||Number(f.valor)<=0){ mostrarAlerta('Preencha o valor do frete.'); return; }
  if(tipo==='faturado'&&!f.formaPgto){ mostrarAlerta('Selecione a forma de pagamento (À vista, PIX ou Boleto).'); return; }
  if(!f.prazoVenc){ mostrarAlerta('Selecione o prazo de vencimento.'); return; }

  enviando = true;
  render();

  const dados = {
    motorista: motSelecionado,
    servico: f.servico,
    remetente: f.remetente,
    remCnpj: f.remCnpj||'',
    destinatario: f.destinatario,
    destCnpj: f.destCnpj||'',
    origem: f.origem,
    destino: f.destino,
    valor: Number(f.valor),
    tipo: tipo,
    formaPgto: tipo==='faturado'?(f.formaPgto||''):'mensal',
    emitirNF: f.emitirNF||'nao',
    prazoVenc: f.prazoVenc,
    vencimento: f.vencimento||'',
    obs: f.obs||'',
    datetime: f.datetime||hojeLocal(),
    status: 'pendente',
    criadoEm: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection('fretes_motoristas').add(dados);
    enviando = false;
    form = {};
    mostrarSucesso(dados);
  } catch(e) {
    enviando = false;
    mostrarAlerta('Erro ao enviar. Verifique sua conexão: '+e.message);
    render();
  }
}

async function carregarHistorico(){
  const el = document.getElementById('hist-list');
  if(!el) return;
  try {
    const snap = await db.collection('fretes_motoristas')
      .where('motorista','==',motSelecionado)
      .orderBy('criadoEm','desc')
      .limit(5)
      .get();

    if(snap.empty){ el.innerHTML='<span>Nenhum frete registrado ainda.</span>'; return; }

    let h='';
    snap.forEach(doc=>{
      const d=doc.data();
      const dt=d.datetime?d.datetime.slice(0,10).split('-').reverse().join('/'):'-';
      const stMap={pendente:['st-pend','Aguardando'],aprovado:['st-aprov','Aprovado'],rejeitado:['st-rej','Rejeitado']};
      const [stCls,stTxt]=stMap[d.status]||['st-pend','Pendente'];
      h+=`<div class="hist-item">
        <div class="hist-left">
          <div class="hist-servico">${(d.servico||'').slice(0,45)}${(d.servico||'').length>45?'…':''}</div>
          <div class="hist-meta">${dt} · ${d.remetente||'-'} → ${d.destinatario||'-'}</div>
        </div>
        <div class="hist-right">
          <div class="hist-valor">${fmtMoney(d.valor)}</div>
          <span class="hist-status ${stCls}">${stTxt}</span>
        </div>
      </div>`;
    });
    el.innerHTML=h;
  } catch(e){
    if(el) el.innerHTML='<span style="color:var(--red)">Erro ao carregar histórico.</span>';
  }
}
